<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

    <title>Quetza Forecast | Admin Panel</title>
</head>
<body class="bg-slate-950 text-slate-200 font-mono p-4 max-w-screen-md mx-auto">

    <header class="mb-8 border-b border-red-900 pb-4 mt-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black text-red-500 uppercase tracking-widest">⚙️ Quetza Admin</h1>
            <p class="text-[10px] text-slate-500 uppercase">Control Central (Nube)</p>
        </div>
        <span class="text-[9px] bg-green-900/30 text-green-500 border border-green-800 px-3 py-1 rounded-full animate-pulse">Online</span>
    </header>

    <div class="bg-slate-900 p-6 rounded-2xl border border-dashed border-red-900 mb-8">
        <h2 class="text-lg font-bold text-white mb-4">Lanzar Nuevo Mercado Global</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Categoría</label>
                <select id="m-cat" class="w-full bg-slate-950 border border-slate-800 text-white text-sm p-2 rounded">
                    <option value="🪙 Cripto">🪙 Cripto (Auto 2 Min)</option>
                    <option value="📈 Finanzas">📈 Finanzas (Auto 2 Min)</option>
                    <option value="🏛️ Política">🏛️ Política (Manual)</option>
                    <option value="⚽ Deportes">⚽ Deportes (Manual)</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Activo / Tema</label>
                <input id="m-asset" type="text" placeholder="Ej: Bitcoin, LA Galaxy..." class="w-full bg-slate-950 border border-slate-800 text-white text-sm p-2 rounded">
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Pregunta Principal</label>
                <input id="m-question" type="text" placeholder="¿Logrará el objetivo?" class="w-full bg-slate-950 border border-slate-800 text-white text-sm p-2 rounded">
            </div>
            <div>
                <label class="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Símbolo TradingView</label>
                <input id="m-symbol" type="text" placeholder="Ej: BINANCE:BTCUSDT" class="w-full bg-slate-950 border border-slate-800 text-white text-sm p-2 rounded">
            </div>
        </div>
        <button onclick="createMarket()" class="w-full bg-red-900 hover:bg-red-800 text-white font-black py-3 rounded-lg uppercase text-xs tracking-widest transition-colors mt-2 shadow-[0_0_15px_rgba(153,27,27,0.5)]">
            🚀 Desplegar Mercado a todos los jugadores
        </button>
    </div>

    <div>
        <h2 class="text-lg font-bold text-white mb-4 border-b border-slate-800 pb-2">Panel de Liquidación en Vivo</h2>
        <div id="admin-markets-list" class="space-y-4">
            <p class="text-slate-500 italic text-sm animate-pulse">Conectando a Firebase...</p>
        </div>
    </div>

    <script>
        // 1. INICIALIZAR FIREBASE ADMIN
        const firebaseConfig = {
            apiKey: "AIzaSyAQcptmRYAKQdjGzkUiRjI2xmgB2dgnyIw",
            authDomain: "quetza-mx.firebaseapp.com",
            projectId: "quetza-mx",
            storageBucket: "quetza-mx.firebasestorage.app",
            messagingSenderId: "543605206347",
            appId: "1:543605206347:web:cbe986ea33b0b37acf0cce"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. ESCUCHAR LOS MERCADOS ACTIVOS EN LA NUBE
        db.collection("markets").onSnapshot((snapshot) => {
            const list = document.getElementById('admin-markets-list');
            let html = '';
            
            if (snapshot.empty) {
                list.innerHTML = `<p class="text-slate-500 italic text-sm">No hay mercados activos en la nube.</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const m = doc.data();
                if (m.status === 'RESOLVED') return; 

                html += `
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex flex-col md:flex-row justify-between items-center gap-4 shadow-lg">
                    <div class="flex-1">
                        <span class="text-[9px] bg-slate-800 px-2 py-1 rounded ${m.resolution === 'AUTO' ? 'text-blue-400' : 'text-yellow-500'} uppercase tracking-widest">
                            ${m.cat} [${m.resolution}]
                        </span>
                        <p class="font-bold text-white mt-2 leading-tight">${m.question}</p>
                        <p class="text-[10px] text-slate-500 mt-1">ID: ${doc.id}</p>
                    </div>
                    <div class="flex space-x-2 w-full md:w-auto">
                        <button onclick="resolveMarket('${doc.id}', 'SÍ')" class="flex-1 bg-green-800 hover:bg-green-700 text-white text-[10px] px-4 py-3 rounded-lg font-bold uppercase tracking-widest">Gana SÍ</button>
                        <button onclick="resolveMarket('${doc.id}', 'NO')" class="flex-1 bg-red-800 hover:bg-red-700 text-white text-[10px] px-4 py-3 rounded-lg font-bold uppercase tracking-widest">Gana NO</button>
                        <button onclick="deleteMarket('${doc.id}')" class="bg-slate-800 hover:bg-slate-700 text-slate-400 text-[10px] px-3 py-3 rounded-lg font-bold uppercase">🗑️</button>
                    </div>
                </div>`;
            });
            list.innerHTML = html || `<p class="text-slate-500 italic text-sm">Procesando liquidaciones...</p>`;
        });

        // 3. ENVIAR NUEVO MERCADO A FIREBASE
        function createMarket() {
            const cat = document.getElementById('m-cat').value;
            const asset = document.getElementById('m-asset').value;
            const question = document.getElementById('m-question').value;
            const symbol = document.getElementById('m-symbol').value;

            if(!asset || !question) return alert("Faltan datos.");

            const isAuto = cat.includes("Cripto") || cat.includes("Finanzas");
            const endTime = isAuto ? Date.now() + 120000 : null;

            db.collection("markets").add({ 
                cat: cat.split(' ')[1] + " " + (cat.split(' ')[2] || ""), 
                asset: asset, 
                question: question, 
                symbol: symbol,
                resolution: isAuto ? 'AUTO' : 'MANUAL',
                endTime: endTime,
                status: 'ACTIVE'
            }).then(() => {
                document.getElementById('m-asset').value = '';
                document.getElementById('m-question').value = '';
                document.getElementById('m-symbol').value = '';
            });
        }

        // 4. RESOLVER MERCADO MANUALMENTE
        function resolveMarket(marketId, winningSide) {
            if(!confirm(`¿Lanzar señal a todos los jugadores de que GANA ${winningSide}?`)) return;

            db.collection("markets").doc(marketId).update({
                status: 'RESOLVED',
                winningSide: winningSide
            });

            setTimeout(() => {
                db.collection("markets").doc(marketId).delete();
            }, 5000);
        }

        // 5. BORRAR MERCADO (Si te equivocaste al crearlo)
        function deleteMarket(marketId) {
            if(confirm("¿Cancelar y borrar mercado? (No reembolsa a los usuarios)")) {
                db.collection("markets").doc(marketId).delete();
            }
        }
        // 6. MOTOR DE AUTO-RENOVACIÓN (Exclusivo del Admin)
        // Revisa cada 2 segundos si algún mercado automático ya caducó para reiniciarlo
        setInterval(() => {
            db.collection("markets").get().then(snapshot => {
                snapshot.forEach(doc => {
                    let m = doc.data();
                    // Si es automático, está activo, y el tiempo ya se agotó...
                    if (m.resolution === 'AUTO' && m.status === 'ACTIVE' && m.endTime && Date.now() > m.endTime) {
                        // Reiniciamos el reloj dándole 2 minutos nuevos a todos los jugadores
                        db.collection("markets").doc(doc.id).update({
                            endTime: Date.now() + 120000
                        });
                    }
                });
            });
        }, 2000);
    </script>
</body>
</html>

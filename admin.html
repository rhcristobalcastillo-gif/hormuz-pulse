<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza Forecast | Admin Panel</title>
</head>
<body class="bg-slate-950 text-slate-200 font-mono p-4 max-w-screen-md mx-auto">

    <header class="mb-8 border-b border-red-900 pb-4 mt-8">
        <h1 class="text-2xl font-black text-red-500 uppercase tracking-widest">⚙️ Quetza Admin Core</h1>
        <p class="text-[10px] text-slate-500 uppercase">Panel de Resolución del Oráculo</p>
    </header>

    <div class="bg-slate-900 p-6 rounded-2xl border border-dashed border-red-900 mb-8">
        <h2 class="text-lg font-bold text-white mb-4">Lanzar Nuevo Mercado</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Categoría</label>
                <select id="m-cat" class="w-full bg-slate-950 border border-slate-800 text-white text-sm p-2 rounded">
                    <option value="🪙 Cripto">🪙 Cripto</option>
                    <option value="🏛️ Política">🏛️ Política</option>
                    <option value="⚽ Deportes">⚽ Deportes</option>
                    <option value="📈 Finanzas">📈 Finanzas</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Activo / Tema</label>
                <input id="m-asset" type="text" placeholder="Ej: LA Galaxy vs Toluca" class="w-full bg-slate-950 border border-slate-800 text-white text-sm p-2 rounded">
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Pregunta Principal</label>
                <input id="m-question" type="text" placeholder="¿Logrará remontar LA Galaxy al Toluca?" class="w-full bg-slate-950 border border-slate-800 text-white text-sm p-2 rounded">
            </div>
            <div>
                <label class="text-[10px] text-slate-400 uppercase tracking-widest block mb-1">Símbolo TradingView (Opcional)</label>
                <input id="m-symbol" type="text" placeholder="Ej: BINANCE:BTCUSDT" class="w-full bg-slate-950 border border-slate-800 text-white text-sm p-2 rounded">
            </div>
        </div>
        <button onclick="createMarket()" class="w-full bg-red-900 hover:bg-red-800 text-white font-black py-3 rounded-lg uppercase text-xs tracking-widest transition-colors mt-2">
            Desplegar Mercado
        </button>
    </div>

    <div>
        <h2 class="text-lg font-bold text-white mb-4 border-b border-slate-800 pb-2">Panel de Liquidación</h2>
        <div id="admin-markets-list" class="space-y-4"></div>
    </div>

    <script>
        // Usamos la versión 12 de las variables para evitar conflictos con datos viejos
        let markets = JSON.parse(localStorage.getItem('q_markets_v12')) || [];

        function renderAdminMarkets() {
            const list = document.getElementById('admin-markets-list');
            if (markets.length === 0) {
                list.innerHTML = `<p class="text-slate-500 italic">No hay mercados activos.</p>`;
                return;
            }

            list.innerHTML = markets.map((m, index) => `
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex-1">
                        <span class="text-[9px] bg-slate-800 px-2 py-1 rounded text-yellow-500 uppercase tracking-widest">${m.cat}</span>
                        <p class="font-bold text-white mt-2 leading-tight">${m.question}</p>
                    </div>
                    <div class="flex space-x-2 w-full md:w-auto">
                        <button onclick="resolveMarket(${index}, 'SÍ')" class="flex-1 bg-green-800 hover:bg-green-700 text-white text-[10px] px-4 py-3 rounded-lg font-bold uppercase tracking-widest">Gana SÍ</button>
                        <button onclick="resolveMarket(${index}, 'NO')" class="flex-1 bg-red-800 hover:bg-red-700 text-white text-[10px] px-4 py-3 rounded-lg font-bold uppercase tracking-widest">Gana NO</button>
                        <button onclick="deleteMarket(${index})" class="bg-slate-800 hover:bg-slate-700 text-slate-400 text-[10px] px-3 py-3 rounded-lg font-bold uppercase" title="Borrar sin pagar">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function createMarket() {
            const cat = document.getElementById('m-cat').value;
            const asset = document.getElementById('m-asset').value;
            const question = document.getElementById('m-question').value;
            const symbol = document.getElementById('m-symbol').value;

            if(!asset || !question) return alert("Faltan datos.");
            markets.unshift({ id: Date.now(), cat, asset, question, symbol });
            localStorage.setItem('q_markets_v12', JSON.stringify(markets));
            renderAdminMarkets();
            alert("Mercado publicado con éxito.");
        }

        // EL MOTOR DE LIQUIDACIÓN
        function resolveMarket(index, winningSide) {
            if(!confirm(`¿Estás seguro de liquidar este mercado como GANA ${winningSide}? Se pagarán los premios automáticamente.`)) return;

            const m = markets[index];
            
            // Leemos si el usuario tenía apuestas activas en este mercado
            let activeBets = JSON.parse(localStorage.getItem('q_active_bets_v12')) || {};
            let userBet = activeBets[m.id];

            if (userBet) {
                // Sacar cartera del usuario
                let userBalance = parseFloat(localStorage.getItem('q_bal_v12')) || 1000.00;
                let userHistory = JSON.parse(localStorage.getItem('q_hist_v12')) || [];
                
                const won = (userBet.side === winningSide);
                if (won) userBalance += 200; // Paga la apuesta doble

                userHistory.unshift({ win: won, amt: won ? 200 : 100, side: userBet.side, asset: m.asset });
                if(userHistory.length > 5) userHistory.pop();

                // Guardar la nueva cartera del usuario
                localStorage.setItem('q_bal_v12', userBalance);
                localStorage.setItem('q_hist_v12', JSON.stringify(userHistory));
                
                // Eliminar la apuesta de la lista de pendientes
                delete activeBets[m.id];
                localStorage.setItem('q_active_bets_v12', JSON.stringify(activeBets));
            }

            // Borrar el mercado porque ya terminó
            markets.splice(index, 1);
            localStorage.setItem('q_markets_v12', JSON.stringify(markets));
            renderAdminMarkets();
            alert("Liquidación completada y fondos transferidos.");
        }

        function deleteMarket(index) {
            if(confirm("¿Seguro que quieres borrar este mercado SIN resolver apuestas?")) {
                markets.splice(index, 1);
                localStorage.setItem('q_markets_v12', JSON.stringify(markets));
                renderAdminMarkets();
            }
        }

        window.onload = renderAdminMarkets;
    </script>
</body>
</html>

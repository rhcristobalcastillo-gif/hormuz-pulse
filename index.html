<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Hormuz Pulse | XAUT Edition</title>
</head>
<body class="bg-slate-950 text-slate-200 font-mono p-6">

    <header class="border-b border-slate-800 pb-4 mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-yellow-500 tracking-tighter">HORMUZ_PULSE v1.1</h1>
            <p class="text-xs text-slate-500">GOLD & LIQUIDITY SENSOR</p>
        </div>
        <div id="status-badge">
            <span class="bg-red-900/30 text-red-500 px-3 py-1 rounded-full text-xs animate-pulse font-bold">MONITORING ASSETS</span>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 flex flex-col items-center justify-center">
            <h3 class="text-sm mb-4 text-yellow-500">MANIPULATION HEAT</h3>
            <div id="heat-circle" class="w-32 h-32 rounded-full border-8 border-blue-500 flex items-center justify-center transition-all duration-500">
                <span id="heat-value" class="text-3xl font-bold">0%</span>
            </div>
            <p id="logic-label" class="mt-4 text-xs text-slate-500 italic text-center">Analizando correlación Oro/BTC...</p>
        </div>

        <div class="md:col-span-2 bg-slate-900 p-6 rounded-xl border border-slate-800">
            <h3 class="text-sm mb-4 uppercase text-slate-400">Geopolitical Risk Sensors</h3>
            <div class="space-y-4">
                <div class="flex justify-between border-b border-slate-800 pb-2">
                    <span class="text-yellow-400">TETHER GOLD (XAUT)</span>
                    <span id="gold-price" class="font-bold">Cargando...</span>
                </div>
                <div class="flex justify-between border-b border-slate-800 pb-2">
                    <span>BITCOIN (RISK ON/OFF)</span>
                    <span id="btc-price" class="font-bold text-orange-400">Cargando...</span>
                </div>
                <div class="flex justify-between">
                    <span>EUR/USD (FIAT STABILITY)</span>
                    <span id="eur-price" class="font-bold text-blue-400">Cargando...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '1943e6176ad54469b00c88773080d5b4'; 
        const SYMBOLS = 'XAUT/USD,BTC/USD,EUR/USD'; 

        async function updateMarketData() {
            try {
                const response = await fetch(`https://api.twelvedata.com/price?symbol=${SYMBOLS}&apikey=${API_KEY}`);
                const data = await response.json();
                
                const gold = data['XAUT/USD'] ? parseFloat(data['XAUT/USD'].price) : 0;
                const btc = data['BTC/USD'] ? parseFloat(data['BTC/USD'].price) : 0;
                const eur = data['EUR/USD'] ? parseFloat(data['EUR/USD'].price) : 0;

                document.getElementById('gold-price').innerText = gold > 0 ? `$${gold.toFixed(2)}` : 'Error API';
                document.getElementById('btc-price').innerText = btc > 0 ? `$${btc.toLocaleString()}` : 'Error API';
                document.getElementById('eur-price').innerText = eur > 0 ? `$${eur.toFixed(4)}` : 'Error API';

                let heatLevel = 0;

                // LÓGICA DE CALOR ACTUALIZADA
                if (gold > 2350) heatLevel += 40; // El oro sube por refugio
                if (btc < 64000) heatLevel += 40; // Bitcoin cae (fuga de capital)
                if (eur < 1.08) heatLevel += 20;  // Debilidad en divisas tradicionales

                const heatDisplay = document.getElementById('heat-value');
                const circle = document.getElementById('heat-circle');
                const label = document.getElementById('logic-label');

                heatDisplay.innerText = `${heatLevel}%`;

                if (heatLevel >= 80) {
                    label.innerText = "ALERTA: Fuga masiva a refugios (ORO)";
                    label.className = "mt-4 text-xs text-red-500 font-bold animate-pulse text-center";
                    circle.className = "w-32 h-32 rounded-full border-8 border-red-600 shadow-[0_0_30px_rgba(220,38,38,0.8)] flex items-center justify-center transition-all duration-500";
                } else if (heatLevel >= 40) {
                    label.innerText = "AVISO: Movimientos defensivos detectados";
                    label.className = "mt-4 text-xs text-orange-400 font-medium text-center";
                    circle.className = "w-32 h-32 rounded-full border-8 border-orange-500 shadow-[0_0_20px_rgba(234,88,12,0.5)] flex items-center justify-center transition-all duration-500";
                } else {
                    label.innerText = "Mercado en Calma Relativa";
                    label.className = "mt-4 text-xs text-slate-500 text-center";
                    circle.className = "w-32 h-32 rounded-full border-8 border-blue-500 flex items-center justify-center transition-all duration-500";
                }
            } catch (error) { console.error(error); }
        }

        setInterval(updateMarketData, 60000);
        updateMarketData(); 
    </script>
</body>
</html>

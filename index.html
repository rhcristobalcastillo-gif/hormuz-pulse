<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza Forecast v2.9 | Settlement Engine</title>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; font-weight: 900; }
        .tradingview-widget-container { height: 140px !important; }
        @keyframes flash-green { 0% { background: transparent; } 50% { background: #16a34a55; } 100% { background: transparent; } }
        .win-animate { animation: flash-green 1s ease-out; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-mono p-4 max-w-screen-xl mx-auto">

    <nav class="flex justify-center space-x-8 mb-8 border-b border-slate-800 pb-2 text-[10px] uppercase tracking-[0.2em]">
        <button id="tab-monitor" onclick="switchTab('monitor')" class="tab-active py-2">📡 Monitor Global</button>
        <button id="tab-quetza" onclick="switchTab('quetza')" class="py-2 text-slate-500">🦅 Quetza Consensus</button>
    </nav>

    <div id="view-monitor">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-lg font-bold text-yellow-500 tracking-tighter uppercase">Friction Monitor</h1>
                <p class="text-[9px] text-slate-400 uppercase tracking-[0.2em]">Jalisco Node | v2.9</p>
            </div>
            <div id="status-binance" class="bg-green-900/30 text-green-400 px-3 py-1 rounded-full text-[8px] font-bold border border-green-800">
                BTC LIVE: <span id="btc-price">...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900/80 rounded-xl border border-slate-800 p-2 overflow-hidden">
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    { "symbol": "BITFINEX:XAUTUSD", "width": "100%", "height": "100%", "locale": "es", "dateRange": "1D", "colorTheme": "dark", "trendLineColor": "#eab308" }
                    </script>
                </div>
            </div>
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 flex justify-around items-center">
                <div class="text-center">
                    <p class="text-[8px] text-yellow-500 uppercase mb-2 tracking-widest">Hormuz Pulse</p>
                    <div id="pulse-container" class="w-20 h-20 rounded-full border-4 border-red-600 flex items-center justify-center shadow-[0_0_15px_#dc262655]">
                        <span id="pulse-number" class="text-xl font-black">85%</span>
                    </div>
                </div>
                <div class="text-center">
                    <p class="text-[8px] text-orange-500 uppercase mb-2 tracking-widest">IA Taco Trade</p>
                    <div class="w-20 h-20 rounded-full border-4 border-orange-600 flex items-center justify-center">
                        <span class="text-xl font-black">72%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 rounded-xl p-4">
            <h3 class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-4 italic">Historial de Predicciones</h3>
            <div id="history-list" class="space-y-2 text-[10px]">
                <p class="text-slate-600 italic">No hay registros aún...</p>
            </div>
        </div>
    </div>

    <div id="view-quetza" class="hidden" style="display: none;">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black text-yellow-500 italic uppercase">QuetzaPredict</h2>
            <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl text-right min-w-[120px]">
                <p class="text-[8px] text-slate-500 uppercase">Saldo</p>
                <p id="user-credits" class="text-xl font-black text-green-400">1,000.00</p>
                <p class="text-[7px] text-green-900 font-bold">fUSDT</p>
            </div>
        </div>

        <div id="bet-card" class="bg-slate-900/50 border border-slate-800 p-6 rounded-2xl border-t-4 border-t-yellow-600 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <span class="bg-red-600 text-white text-[8px] px-2 py-1 rounded-full font-bold animate-pulse">LIVE MARKET #042</span>
                <span class="text-slate-500 text-[10px]">CIERRE: <span id="quetza-timer" class="text-yellow-500 font-bold">15:00</span></span>
            </div>
            
            <h3 class="text-xl font-bold mb-8 italic text-center">
                ¿Validarás el Oro (XAUT) sobre <span class="text-white bg-slate-800 px-2">$4,850.00</span>?
            </h3>

            <div class="flex space-x-3 mb-6">
                <button id="btn-yes" onclick="makeBet('SÍ')" class="flex-1 bg-green-700 py-4 rounded-xl font-black text-[10px] tracking-widest uppercase hover:bg-green-600 transition-all">SÍ / ALZA</button>
                <button id="btn-no" onclick="makeBet('NO')" class="flex-1 bg-red-700 py-4 rounded-xl font-black text-[10px] tracking-widest uppercase hover:bg-red-600 transition-all">NO / BAJA</button>
            </div>

            <div class="border-t border-slate-800 pt-4 flex justify-between text-[10px] text-slate-500 font-bold">
                <span>POSICIÓN: <span id="user-pos" class="text-white">PENDIENTE</span></span>
                <span>MONTO: <span id="user-amt" class="text-white">0.00</span> fUSDT</span>
            </div>
        </div>
    </div>

    <script>
        // --- VARIABLES DE ESTADO ---
        let balance = localStorage.getItem('q_bal') ? parseFloat(localStorage.getItem('q_bal')) : 1000.00;
        let activeBet = { side: null, amount: 0 };
        let strikePrice = 4850.00; // El precio a vencer
        let timerRunning = false;
        let history = JSON.parse(localStorage.getItem('q_hist')) || [];

        function updateUI() {
            document.getElementById('user-credits').innerText = balance.toFixed(2);
            document.getElementById('user-pos').innerText = activeBet.side || 'PENDIENTE';
            document.getElementById('user-amt').innerText = activeBet.amount.toFixed(2);
            renderHistory();
            localStorage.setItem('q_bal', balance);
            localStorage.setItem('q_hist', JSON.stringify(history));
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (history.length === 0) return;
            list.innerHTML = history.map(h => `
                <div class="flex justify-between border-b border-slate-800 pb-1">
                    <span class="${h.win ? 'text-green-500' : 'text-red-500'} font-bold">${h.win ? 'WIN' : 'LOSS'}</span>
                    <span class="text-slate-400">Escenario: ${h.side}</span>
                    <span class="text-white">${h.win ? '+' : '-'}${h.amt} fUSDT</span>
                </div>
            `).join('');
        }

        // --- LÓGICA DE APUESTA ---
        function makeBet(side) {
            if (activeBet.amount > 0) return alert("Ya tienes una posición abierta.");
            if (balance < 100) return alert("Saldo insuficiente.");
            
            balance -= 100;
            activeBet = { side: side, amount: 100 };
            updateUI();
            alert(`Posición ${side} abierta. Espera al cierre del mercado.`);
        }

        // --- LÓGICA DE LIQUIDACIÓN (ESTO RESPONDE TU PREGUNTA) ---
        function settleMarket() {
            // Simulamos el precio final (esto vendría de la API en tiempo real)
            // Generamos un precio aleatorio cerca de 4850 para probar
            const finalPrice = (4848 + Math.random() * 4).toFixed(2);
            let won = false;

            if (activeBet.amount > 0) {
                if (activeBet.side === 'SÍ' && finalPrice >= strikePrice) won = true;
                if (activeBet.side === 'NO' && finalPrice < strikePrice) won = true;

                if (won) {
                    balance += (activeBet.amount * 2);
                    history.unshift({ win: true, amt: 100, side: activeBet.side });
                } else {
                    history.unshift({ win: false, amt: 100, side: activeBet.side });
                }
                
                // Efecto visual de feedback
                document.getElementById('bet-card').classList.add('win-animate');
                setTimeout(() => document.getElementById('bet-card').classList.remove('win-animate'), 1000);
            }

            // Reiniciar mercado
            activeBet = { side: null, amount: 0 };
            if (history.length > 5) history.pop();
            updateUI();
            
            alert(`MERCADO CERRADO\nPrecio Final: $${finalPrice}\nResultado: ${won ? '¡GANASTE!' : 'PERDISTE'}`);
            
            // Reiniciar cronómetro para demo
            timerRunning = false;
            startTimer(0.5); // Reinicia a 30 segundos para probar rápido
        }

        // --- CRONÓMETRO ---
        function startTimer(minutes) {
            if (timerRunning) return;
            timerRunning = true;
            let time = minutes * 60;
            const display = document.getElementById('quetza-timer');
            
            const count = setInterval(() => {
                let m = Math.floor(time / 60), s = time % 60;
                display.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                if (--time < 0) {
                    clearInterval(count);
                    settleMarket();
                }
            }, 1000);
        }

        // --- UTILIDADES ---
        function switchTab(tab) {
            document.getElementById('view-monitor').style.display = tab === 'monitor' ? 'block' : 'none';
            document.getElementById('view-quetza').style.display = tab === 'quetza' ? 'block' : 'none';
            document.getElementById('tab-monitor').className = tab === 'monitor' ? 'tab-active py-2' : 'py-2 text-slate-500';
            document.getElementById('tab-quetza').className = tab === 'quetza' ? 'tab-active py-2' : 'py-2 text-slate-500';
            if (tab === 'quetza' && !timerRunning) startTimer(1);
        }

        async function getBTC() {
            try {
                const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('btc-price').innerText = `$${parseFloat(d.price).toFixed(0)}`;
            } catch(e) {}
        }

        window.onload = () => {
            getBTC(); setInterval(getBTC, 5000);
            updateUI();
            switchTab('monitor');
        };
    </script>
</body>
</html>

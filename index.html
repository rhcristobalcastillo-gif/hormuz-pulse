<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Monitor v1.8 | Resilience Mode</title>
    <style>
        canvas { width: 100% !important; height: 35px !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .alert-pulse { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-mono p-4 max-w-screen-xl mx-auto">

    <header class="border-b border-slate-800 pb-4 mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-lg sm:text-xl font-bold text-yellow-500 tracking-tighter uppercase">Friction Monitor v1.8</h1>
            <p id="system-status" class="text-[9px] sm:text-[10px] text-slate-400 uppercase tracking-[0.2em]">Cargando Sensores...</p>
        </div>
        <span id="live-badge" class="bg-blue-900/20 text-blue-400 px-2 py-1 rounded-full text-[9px] font-bold border border-blue-800/50 uppercase italic">Iniciando...</span>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
        <div class="bg-slate-900/80 p-3 rounded-lg border border-slate-800 shadow-inner">
            <span class="text-[9px] text-yellow-600 block mb-1 font-bold uppercase tracking-widest text-center">XAUT (GOLD)</span>
            <div class="flex justify-between items-end mb-2 px-2">
                <span id="gold-price" class="text-xl font-bold text-yellow-100">$4,762.00</span>
                <span id="gold-pct" class="text-[10px] text-slate-500">0.00%</span>
            </div>
            <canvas id="gold-chart"></canvas>
        </div>
        <div class="bg-slate-900/80 p-3 rounded-lg border border-slate-800 shadow-inner">
            <span class="text-[9px] text-orange-600 block mb-1 font-bold uppercase tracking-widest text-center">BTC (RISK)</span>
            <div class="flex justify-between items-end mb-2 px-2">
                <span id="btc-price" class="text-xl font-bold text-orange-100">$74,796</span>
                <span id="btc-pct" class="text-[10px] text-slate-500">0.00%</span>
            </div>
            <canvas id="btc-chart"></canvas>
        </div>
        <div class="bg-slate-900/80 p-3 rounded-lg border border-slate-800 shadow-inner">
            <span class="text-[9px] text-blue-600 block mb-1 font-bold uppercase tracking-widest text-center">EUR/USD (FIAT)</span>
            <div class="flex justify-between items-end mb-2 px-2">
                <span id="eur-price" class="text-xl font-bold text-blue-100">$1.1795</span>
                <span id="eur-pct" class="text-[10px] text-slate-500">0.00%</span>
            </div>
            <canvas id="eur-chart"></canvas>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 text-center">
        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-lg">
            <h3 class="text-[10px] text-yellow-500 font-bold uppercase tracking-[0.3em] mb-4">Hormuz Pulse</h3>
            <div id="hormuz-circle" class="w-28 h-28 mx-auto rounded-full border-8 border-blue-500 flex items-center justify-center transition-all duration-1000">
                <span id="hormuz-value" class="text-2xl font-bold">40%</span>
            </div>
            <p id="hormuz-label" class="mt-4 text-[10px] text-slate-500 italic uppercase">Estable</p>
        </div>
        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-lg">
            <h3 class="text-[10px] text-orange-400 font-bold uppercase tracking-[0.3em] mb-4">Taco Trade (IA)</h3>
            <div id="taco-circle" class="w-28 h-28 mx-auto rounded-full border-8 border-blue-500 flex items-center justify-center transition-all duration-1000">
                <span id="taco-value" class="text-2xl font-bold">35%</span>
            </div>
            <p id="taco-label" class="mt-4 text-[10px] text-slate-500 italic uppercase">Neutro</p>
        </div>
    </div>

    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-[9px] text-slate-400 uppercase tracking-widest">Intelligence Feed</h3>
            <span id="friction-mult-display" class="text-[10px] text-blue-400 font-bold bg-blue-900/20 px-2 py-0.5 rounded">X1.00</span>
        </div>
        <div id="news-feed" class="text-[10px] space-y-2 max-h-32 overflow-y-auto pr-2 scrollbar-hide italic text-slate-400">
            [SYS]: v1.8 Desplegada. Sincronizando con mercados del 14-Abr-2026...
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const KEY = '269d17eafe284411b6e5da2768325a1a';
        // Precios reales del 14 de Abril de 2026 como base
        let lastKnown = { gold: 4835.69, btc: 74610.6, eur: 1.1795 };
        let history = { 
            gold: [4731, 4745, 4755, 4762,4840], 
            btc: [74442, 74616, 74816, 74796,74,624], 
            eur: [1.1767, 1.1788, 1.1798, 1.1795] 
        };
        let charts = {};

        function initCharts() {
            ['gold', 'btc', 'eur'].forEach(id => {
                const ctx = document.getElementById(`${id}-chart`).getContext('2d');
                charts[id] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: new Array(history[id].length).fill(''),
                        datasets: [{
                            data: history[id],
                            borderColor: id === 'gold' ? '#fde047' : (id === 'btc' ? '#fb923c' : '#60a5fa'),
                            borderWidth: 1.5,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.3
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
                });
            });
        }

        async function updateMarketData() {
            try {
                let current = { ...lastKnown };
                let success = true;

                const symbols = ['XAUT/USD', 'BTC/USD', 'EUR/USD'];
                for (const s of symbols) {
                    const r = await fetch(`https://api.twelvedata.com/price?symbol=${s}&apikey=${KEY}`);
                    const d = await r.json();
                    
                    if (d.code === 429) { success = false; break; }
                    if (d.price) {
                        const val = parseFloat(d.price);
                        if (s === 'XAUT/USD') current.gold = val;
                        if (s === 'BTC/USD') current.btc = val;
                        if (s === 'EUR/USD') current.eur = val;
                    }
                }

                if (!success) {
                    setStatus('OFFLINE', 'orange');
                    updateUI(lastKnown, false);
                } else {
                    lastKnown = current;
                    setStatus('LIVE', 'green');
                    updateUI(current, true);
                }
            } catch (e) { setStatus('ERROR', 'red'); }
        }

        function setStatus(mode, color) {
            const badge = document.getElementById('live-badge');
            const status = document.getElementById('system-status');
            
            if (mode === 'LIVE') {
                badge.innerText = 'SYSTEM LIVE';
                badge.className = "bg-green-900/20 text-green-400 px-2 py-1 rounded-full text-[9px] font-bold border border-green-800/50 uppercase";
                status.innerText = "DATA SYNC: ACTIVE";
                status.classList.remove('text-orange-500');
            } else {
                badge.innerText = 'OFFLINE MODE';
                badge.className = "bg-orange-900/20 text-orange-400 px-2 py-1 rounded-full text-[9px] font-bold border border-orange-800/50 uppercase alert-pulse";
                status.innerText = "API LIMIT REACHED - USING PREDICTIVE DATA";
                status.classList.add('text-orange-500');
            }
        }

        function updateUI(data, isLive) {
            ['gold', 'btc', 'eur'].forEach(id => {
                const val = data[id];
                document.getElementById(`${id}-price`).innerText = id === 'eur' ? `$${val.toFixed(4)}` : `$${val.toLocaleString()}`;
                
                const lastVal = history[id][history[id].length - 1];
                const diff = (((val - lastVal) / lastVal) * 100).toFixed(2);
                const pctEl = document.getElementById(`${id}-pct`);
                pctEl.innerText = `${diff >= 0 ? '+' : ''}${diff}%`;
                pctEl.className = `text-[10px] ${diff > 0 ? 'text-green-400' : (diff < 0 ? 'text-red-400' : 'text-slate-500')}`;

                if (isLive) {
                    history[id].push(val);
                    if (history[id].length > 20) history[id].shift();
                    charts[id].data.labels = new Array(history[id].length).fill('');
                    charts[id].data.datasets[0].data = history[id];
                    charts[id].update('none');
                }
            });

            // Lógica de Fricción basada en Oro y Euro (Puntos de tensión 14-Abr-2026)
            const friction = (data.gold > 4760 ? 1.25 : 1.0) + (data.eur < 1.18 ? 0.2 : 0);
            document.getElementById('friction-mult-display').innerText = `X${friction.toFixed(2)}`;
            
            const pulse = data.gold > 4760 ? 80 : 40;
            updateCircle('hormuz', pulse, "Tensión");
            updateCircle('taco', (pulse * 0.9), "Riesgo");
        }

        function updateCircle(id, val, label) {
            const disp = document.getElementById(`${id}-value`);
            const circ = document.getElementById(`${id}-circle`);
            const lab = document.getElementById(`${id}-label`);
            disp.innerText = `${Math.round(val)}%`;
            const color = val > 70 ? 'border-red-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]' : 'border-blue-500';
            circ.className = `w-28 h-28 mx-auto rounded-full border-8 ${color} flex items-center justify-center transition-all duration-1000`;
            lab.innerText = val > 70 ? `ALERTA: ${label}` : "Estable";
        }

        initCharts();
        updateMarketData();
        setInterval(updateMarketData, 180000); // 3 minutos para ser extra precavidos
    </script>
</body>
</html>

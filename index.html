<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Monitor v1.6.3 | Anti-Crash System</title>
</head>
<body class="bg-slate-950 text-slate-200 font-mono p-4 max-w-screen-xl mx-auto">

    <header class="border-b border-slate-800 pb-4 mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-lg sm:text-xl font-bold text-yellow-500 tracking-tighter uppercase">Friction Monitor v1.6.3</h1>
            <p id="system-status" class="text-[9px] sm:text-[10px] text-slate-400 uppercase tracking-[0.2em]">Buscando conexión...</p>
        </div>
        <span id="live-badge" class="bg-blue-900/20 text-blue-400 px-2 py-1 rounded-full text-[9px] font-bold border border-blue-800/50 uppercase">System Live</span>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6 text-center">
        <div class="bg-slate-900/80 p-3 rounded-lg border border-slate-800 shadow-inner">
            <span class="text-[9px] text-yellow-600 block mb-1 font-bold uppercase">XAUT (GOLD)</span>
            <span id="gold-price" class="text-lg font-bold text-yellow-100">Cargando...</span>
        </div>
        <div class="bg-slate-900/80 p-3 rounded-lg border border-slate-800 shadow-inner">
            <span class="text-[9px] text-orange-600 block mb-1 font-bold uppercase">BTC (RISK)</span>
            <span id="btc-price" class="text-lg font-bold text-orange-100">Cargando...</span>
        </div>
        <div class="bg-slate-900/80 p-3 rounded-lg border border-slate-800 shadow-inner">
            <span class="text-[9px] text-blue-600 block mb-1 font-bold uppercase">EUR/USD (FIAT)</span>
            <span id="eur-price" class="text-lg font-bold text-blue-100">Cargando...</span>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex flex-col items-center">
            <h3 class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest mb-4">Hormuz Pulse</h3>
            <div id="hormuz-circle" class="w-28 h-28 rounded-full border-8 border-blue-500 flex items-center justify-center transition-all duration-700">
                <span id="hormuz-value" class="text-2xl font-bold">0%</span>
            </div>
            <p id="hormuz-label" class="mt-4 text-[10px] text-slate-500 italic text-center">Iniciando escáner...</p>
        </div>

        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 flex flex-col items-center">
            <h3 class="text-[10px] text-orange-400 font-bold uppercase tracking-widest mb-4">Taco Trade (IA)</h3>
            <div id="taco-circle" class="w-28 h-28 rounded-full border-8 border-blue-500 flex items-center justify-center transition-all duration-700">
                <span id="taco-value" class="text-2xl font-bold">0%</span>
            </div>
            <p id="taco-label" class="mt-4 text-[10px] text-slate-500 italic text-center">Iniciando escáner...</p>
        </div>
    </div>

    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
        <div class="flex justify-between items-center mb-3 text-[9px]">
            <h3 class="text-slate-400 uppercase tracking-widest">Live IA Analysis</h3>
            <span id="friction-mult-display" class="text-blue-400 font-bold">Mult. Fricción: x1.0</span>
        </div>
        <div id="news-feed" class="text-[10px] space-y-2 max-h-40 overflow-y-auto pr-2 scrollbar-thin">
            Verificando variables de mercado...
        </div>
    </div>

    <script>
        const KEY = '269d17eafe284411b6e5da2768325a1a'; 
        
        // Memoria a corto plazo por si la API falla
        let lastKnown = { gold: 4725.50, btc: 74200, eur: 1.1750 };

        async function updateMarketData() {
            try {
                let currentPrices = { gold: 0, btc: 0, eur: 0 };
                let apiBlocked = false;

                // 1. Intentar obtener datos
                const symbols = ['XAUT/USD', 'BTC/USD', 'EUR/USD'];
                for (const s of symbols) {
                    const r = await fetch(`https://api.twelvedata.com/price?symbol=${s}&apikey=${KEY}`);
                    const d = await r.json();
                    
                    if (d.code === 429) {
                        apiBlocked = true;
                        break; // Salimos del loop si estamos bloqueados
                    }
                    
                    if (s === 'XAUT/USD' && d.price) currentPrices.gold = parseFloat(d.price);
                    if (s === 'BTC/USD' && d.price) currentPrices.btc = parseFloat(d.price);
                    if (s === 'EUR/USD' && d.price) currentPrices.eur = parseFloat(d.price);
                }

                // Si la API nos bloqueó, usamos los últimos datos conocidos
                if (apiBlocked) {
                    currentPrices = lastKnown;
                    document.getElementById('system-status').innerText = "API LIMIT REACHED - USING BACKUP DATA";
                    document.getElementById('system-status').classList.replace('text-slate-400', 'text-orange-500');
                    document.getElementById('live-badge').className = "bg-orange-900/20 text-orange-400 px-2 py-1 rounded-full text-[9px] font-bold border border-orange-800/50 uppercase";
                    document.getElementById('live-badge').innerText = "OFFLINE MODE";
                } else {
                    lastKnown = currentPrices; // Guardamos por si falla la próxima
                    document.getElementById('system-status').innerText = "DATA SYNC: ACTIVE";
                    document.getElementById('system-status').classList.replace('text-orange-500', 'text-slate-400');
                    document.getElementById('live-badge').className = "bg-green-900/20 text-green-500 px-2 py-1 rounded-full text-[9px] font-bold border border-green-800/50 uppercase";
                    document.getElementById('live-badge').innerText = "SYSTEM LIVE";
                }

                const { gold, btc, eur } = currentPrices;

                document.getElementById('gold-price').innerText = `$${gold.toFixed(2)}`;
                document.getElementById('btc-price').innerText = `$${btc.toLocaleString()}`;
                document.getElementById('eur-price').innerText = `$${eur.toFixed(4)}`;

                // 2. Procesar Inteligencia
                const feed = document.getElementById('news-feed');
                feed.innerHTML = '';
                let friction = 1.0;
                let aiScore = 0;

                const scenarios = [];
                if (gold > 4700) {
                    scenarios.push({t: "El Oro muestra fuerte soporte por tensiones globales", p: 35});
                    friction += 0.20;
                }
                if (eur < 1.18) {
                    scenarios.push({t: "Dólar refugio presiona a la baja al Euro", p: 25});
                    friction += 0.15;
                }
                if (btc > 74000) {
                    scenarios.push({t: "Volatilidad cripto alta ante incertidumbre", p: 20});
                    friction += 0.10;
                }

                if (scenarios.length === 0) {
                    scenarios.push({t: "Mercados en calma temporal. Analizando...", p: 5});
                }

                scenarios.forEach(s => {
                    aiScore += (s.p * friction);
                    const p = document.createElement('p');
                    p.className = "border-l-2 border-slate-700 pl-2 py-1 hover:bg-slate-800 transition-colors";
                    p.innerHTML = `<span class="text-slate-500 font-bold">[SYS_SCAN]:</span> ${s.t} <span class="text-blue-400 font-bold ml-1">+${(s.p * friction).toFixed(1)}</span>`;
                    feed.appendChild(p);
                });

                document.getElementById('friction-mult-display').innerText = `Mult. Fricción: x${friction.toFixed(2)}`;

                // 3. Actualizar Círculos
                let hormuzHeat = 0;
                if (gold > 4700) hormuzHeat += 40;
                if (gold > 4720) hormuzHeat += 20;
                if (eur < 1.18) hormuzHeat += 20;

                updateCircle('hormuz', hormuzHeat, "Hormuz: Estable");
                updateCircle('taco', (aiScore / 1.5), "Taco: Neutro");

            } catch (e) { console.log("Error general:", e); }
        }

        function updateCircle(id, val, text) {
            const disp = document.getElementById(`${id}-value`);
            const circ = document.getElementById(`${id}-circle`);
            const lab = document.getElementById(`${id}-label`);
            val = Math.round(Math.min(val, 100));
            disp.innerText = `${val}%`;

            if (val >= 60) {
                circ.className = `w-28 h-28 rounded-full border-8 border-red-600 shadow-[0_0_15px_rgba(220,38,38,0.4)] flex items-center justify-center transition-all duration-700`;
                lab.innerText = "ALERTA: Tensión Detectada";
                lab.className = "mt-4 text-[10px] text-red-500 font-bold animate-pulse text-center";
            } else if (val >= 30) {
                circ.className = `w-28 h-28 rounded-full border-8 border-orange-500 flex items-center justify-center transition-all duration-700`;
                lab.innerText = "AVISO: Fricción Activa";
                lab.className = "mt-4 text-[10px] text-orange-400 text-center";
            } else {
                circ.className = `w-28 h-28 rounded-full border-8 border-blue-500 flex items-center justify-center transition-all duration-700`;
                lab.innerText = text;
                lab.className = "mt-4 text-[10px] text-slate-500 italic text-center";
            }
        }

        // Ejecutar inmediatamente y luego cada 90 segundos
        updateMarketData();
        setInterval(updateMarketData, 90000);
    </script>
</body>
</html>

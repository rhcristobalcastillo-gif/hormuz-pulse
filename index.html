<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza Forecast v2.6 | Consensus & Monitor</title>
    <style>

        .btn-active { animation: pulse-gold 2s infinite; }
    </style>
</head>

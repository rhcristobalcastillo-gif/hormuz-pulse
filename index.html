<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza Forecast | Monitor Global</title>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; font-weight: 900; }
        .tradingview-widget-container { height: 140px !important; width: 100%; }
        iframe { pointer-events: none; }
        @keyframes pulse-orange { 0% { box-shadow: 0 0 0px #f97316; } 50% { box-shadow: 0 0 25px #f97316aa; } 100% { box-shadow: 0 0 0px #f97316; } }
        .taco-active { animation: pulse-orange 1.5s infinite; }
        body { transition: background-color 1.5s ease-in-out; }
        .news-ticker { animation: slide-up 0.5s ease-out; }
        @keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="app-body" class="bg-slate-950 text-slate-200 font-mono p-4 max-w-screen-xl mx-auto">

    <nav class="flex justify-center space-x-8 mb-8 border-b border-slate-800 pb-2 text-[10px] uppercase tracking-[0.2em]">
        <a href="index.html" class="tab-active py-2 transition-all">📡 Monitor Global</a>
        <a href="quetza.html" class="py-2 text-slate-500 hover:text-yellow-500 transition-all">🦅 Quetza Consensus</a>
    </nav>

    <div>
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-lg font-bold text-yellow-500 tracking-tighter uppercase">Friction Monitor</h1>
                <p class="text-[9px] text-slate-400 uppercase tracking-[0.2em]">Jalisco Secure Serverless Node</p>
            </div>
            <div class="bg-green-900/30 text-green-400 px-3 py-1 rounded-full text-[8px] font-bold border border-green-800 animate-pulse">
                SISTEMA SEGURO ACTIVO
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
            <div class="bg-slate-900/80 rounded-xl border border-slate-800 p-2 shadow-lg overflow-hidden">
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    { "symbol": "BITFINEX:XAUTUSD", "width": "100%", "height": "100%", "locale": "es", "dateRange": "1D", "colorTheme": "dark", "trendLineColor": "#eab308" }
                    </script>
                </div>
            </div>
            <div class="bg-slate-900/80 rounded-xl border border-slate-800 p-4 text-center shadow-lg flex flex-col justify-center">
                <span class="text-[9px] text-orange-600 block mb-1 font-bold uppercase tracking-widest">BTC / USDT</span>
                <div id="btc-price" class="text-3xl font-black text-orange-100 mb-1">...</div>
                <p class="text-[7px] text-slate-500 uppercase tracking-tighter italic">Binance Direct Feed</p>
            </div>
            <div class="bg-slate-900/80 rounded-xl border border-slate-800 p-2 shadow-lg overflow-hidden">
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    { "symbol": "FX:EURUSD", "width": "100%", "height": "100%", "locale": "es", "dateRange": "1D", "colorTheme": "dark", "trendLineColor": "#60a5fa" }
                    </script>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex flex-col items-center shadow-xl">
                <h3 class="text-[10px] text-yellow-500 font-bold uppercase tracking-[0.4em] mb-4">Hormuz Pulse</h3>
                <div id="pulse-container" class="w-24 h-24 rounded-full border-[6px] border-red-600 flex items-center justify-center transition-all duration-1000 shadow-[0_0_15px_#dc262655]">
                    <span id="pulse-number" class="text-2xl font-black">80%</span>
                </div>
                <p id="pulse-status" class="mt-4 text-[8px] text-red-500 font-bold uppercase tracking-widest italic text-center">Tensión Medio Oriente</p>
            </div>
            
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex flex-col items-center shadow-xl relative overflow-hidden">
                <h3 class="text-[10px] text-orange-500 font-bold uppercase tracking-[0.4em] mb-4">Taco Trade (Gemini AI)</h3>
                <div id="taco-container" class="w-24 h-24 rounded-full border-[6px] border-orange-600 flex items-center justify-center transition-all duration-1000 z-10">
                    <span id="taco-number" class="text-2xl font-black">--%</span>
                </div>
                <div class="mt-4 w-full text-center h-12 flex items-center justify-center">
                    <p id="taco-news" class="text-[9px] text-slate-400 uppercase font-bold italic px-2 news-ticker leading-tight">
                        Conectando a servidor seguro...
                    </p>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl mt-4">
            <h3 class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.4em] mb-4 italic text-center">Registro de Liquidación Reciente</h3>
            <div id="history-list" class="space-y-2 text-[10px]"></div>
        </div>
    </div>

    <script>
        // --- 1. HISTORIAL DE OTRA PESTAÑA ---
        function loadHistory() {
            let history = JSON.parse(localStorage.getItem('q_hist_v8')) || [];
            const list = document.getElementById('history-list');
            if (history.length === 0) {
                list.innerHTML = `<p class="text-slate-600 italic text-center">Aún no hay operaciones en Quetza Consensus...</p>`;
                return;
            }
            list.innerHTML = history.map(h => `
                <div class="flex justify-between border-b border-slate-800 pb-1 items-center">
                    <span class="${h.win ? 'text-green-500' : 'text-red-500'} font-bold">${h.win ? 'GANASTE' : 'PERDISTE'}</span>
                    <span class="text-slate-400">${h.side} ${h.bonus ? '<span class="text-orange-500 animate-pulse text-[8px] border border-orange-500 px-1 rounded ml-1">BONO IA</span>' : ''}</span>
                    <span class="text-white">${h.win ? '+' : '-'}${h.amt} fUSDT</span>
                </div>
            `).join('');
        }

        // --- 2. MOTORES INDEPENDIENTES ---
        function updateHormuzPulse() {
            const newPulse = Math.floor(Math.random() * (95 - 65) + 65);
            const pNumber = document.getElementById('pulse-number');
            const pContainer = document.getElementById('pulse-container');
            const pStatus = document.getElementById('pulse-status');

            pNumber.innerText = `${newPulse}%`;
            if (newPulse > 85) {
                pContainer.style.borderColor = "#dc2626"; 
                pContainer.style.boxShadow = "0 0 25px rgba(220, 38, 38, 0.6)";
                pStatus.innerText = "ALERTA CRÍTICA: ORMUZ";
                pStatus.className = "mt-4 text-[8px] text-red-500 font-bold uppercase tracking-widest italic text-center animate-pulse";
            } else {
                pContainer.style.borderColor = "#ea580c"; 
                pContainer.style.boxShadow = "0 0 10px rgba(234, 88, 12, 0.3)";
                pStatus.innerText = "TENSIÓN ELEVADA";
                pStatus.className = "mt-4 text-[8px] text-orange-500 font-bold uppercase tracking-widest italic text-center";
            }
        }

        async function updateTrumpAILive() {
            try {
                const response = await fetch('/api/getTacoData');
                const aiData = await response.json();
                if (!response.ok) throw new Error(aiData.error || "Error backend");
                applyTacoUI(aiData.risk, aiData.text, aiData.alert);
            } catch (error) {
                applyTacoUI(60, `ESPERANDO DESPLIEGUE EN VERCEL...`, false);
            }
        }

        function applyTacoUI(riskScore, newsText, isAlert) {
            document.getElementById('taco-number').innerText = `${riskScore}%`;
            const tacoCont = document.getElementById('taco-container');
            const tacoNewsText = document.getElementById('taco-news');
            const appBody = document.getElementById('app-body');
            
            tacoNewsText.classList.remove('news-ticker');
            void tacoNewsText.offsetWidth; 
            tacoNewsText.classList.add('news-ticker');

            if (isAlert) {
                tacoCont.classList.add('taco-active');
                tacoCont.style.borderColor = "#ea580c";
                tacoNewsText.innerText = "🚨 " + newsText;
                tacoNewsText.className = "text-[9px] text-orange-500 uppercase font-black px-2 news-ticker leading-tight";
                appBody.style.backgroundColor = "#2a1508"; 
            } else {
                tacoCont.classList.remove('taco-active');
                tacoCont.style.borderColor = "#f59e0b";
                tacoNewsText.innerText = newsText;
                tacoNewsText.className = "text-[9px] text-slate-400 uppercase font-bold italic px-2 news-ticker leading-tight";
                appBody.style.backgroundColor = "#020617"; 
            }
        }

        async function getBTC() {
            try {
                const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('btc-price').innerText = `$${parseFloat(d.price).toFixed(0)}`;
            } catch(e) {}
        }

        // --- ARRANQUE ---
        window.onload = () => {
            getBTC(); setInterval(getBTC, 5000);
            loadHistory();
            updateHormuzPulse(); setInterval(updateHormuzPulse, 15000);
            updateTrumpAILive(); setInterval(updateTrumpAILive, 120000); 
        };
    </script>
</body>
</html>

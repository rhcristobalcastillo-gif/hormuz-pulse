<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza Forecast v2.7 | Live Oracle</title>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; font-weight: 900; }
        .tradingview-widget-container { height: 140px !important; width: 100%; }
        iframe { pointer-events: none; } /* Evita que el usuario interactúe con el mini-gráfico */
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-mono p-4 max-w-screen-xl mx-auto">

    <nav class="flex justify-center space-x-8 mb-8 border-b border-slate-800 pb-2 text-[10px] uppercase tracking-[0.2em]">
        <button id="tab-monitor" onclick="switchTab('monitor')" class="tab-active py-2">📡 Monitor Global</button>
        <button id="tab-quetza" onclick="switchTab('quetza')" class="py-2 text-slate-500 hover:text-yellow-500">🦅 Quetza Consensus</button>
    </nav>

    <div id="view-monitor">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-lg font-bold text-yellow-500 tracking-tighter uppercase">Friction Monitor v2.7</h1>
                <p class="text-[9px] text-slate-400 uppercase tracking-[0.2em]">Jalisco Live Node</p>
            </div>
            <div id="status-binance" class="bg-green-900/30 text-green-400 px-3 py-1 rounded-full text-[8px] font-bold border border-green-800 animate-pulse">
                BINANCE LIVE CONNECTED
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
            <div class="bg-slate-900/80 rounded-xl border border-slate-800 p-2 shadow-lg overflow-hidden">
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    {
                      "symbol": "BITFINEX:XAUTUSD",
                      "width": "100%", "height": "100%", "locale": "es", "dateRange": "1D",
                      "colorTheme": "dark", "trendLineColor": "rgba(234, 179, 8, 1)",
                      "underLineColor": "rgba(234, 179, 8, 0.1)"
                    }
                    </script>
                </div>
            </div>

            <div class="bg-slate-900/80 rounded-xl border border-slate-800 p-4 text-center shadow-lg flex flex-col justify-center">
                <span class="text-[9px] text-orange-600 block mb-1 font-bold uppercase tracking-widest">BTC / USDT</span>
                <div id="btc-price" class="text-3xl font-black text-orange-100 mb-1">Cargando...</div>
                <p class="text-[7px] text-slate-500 uppercase">Binance Direct API (No Delay)</p>
            </div>

            <div class="bg-slate-900/80 rounded-xl border border-slate-800 p-2 shadow-lg overflow-hidden">
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    {
                      "symbol": "FX:EURUSD",
                      "width": "100%", "height": "100%", "locale": "es", "dateRange": "1D",
                      "colorTheme": "dark", "trendLineColor": "rgba(96, 165, 250, 1)",
                      "underLineColor": "rgba(96, 165, 250, 0.1)"
                    }
                    </script>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-slate-900 p-8 rounded-2xl border border-slate-800 flex flex-col items-center">
                <h3 class="text-[10px] text-yellow-500 font-bold uppercase tracking-[0.4em] mb-6">Hormuz Pulse</h3>
                <div class="w-28 h-28 rounded-full border-[8px] border-red-600 shadow-[0_0_20px_rgba(220,38,38,0.4)] flex items-center justify-center">
                    <span class="text-3xl font-black">80%</span>
                </div>
            </div>
            <div class="bg-slate-900 p-8 rounded-2xl border border-slate-800 flex flex-col items-center">
                <h3 class="text-[10px] text-orange-400 font-bold uppercase tracking-[0.4em] mb-6">Taco Trade (IA)</h3>
                <div class="w-28 h-28 rounded-full border-[8px] border-orange-600 shadow-[0_0_20px_rgba(234,146,0,0.4)] flex items-center justify-center">
                    <span class="text-3xl font-black">72%</span>
                </div>
            </div>
        </div>
    </div>

    <div id="view-quetza" style="display: none;">
        <div class="flex justify-between items-start mb-6">
            <h2 class="text-2xl font-black text-yellow-500 italic uppercase">QuetzaPredict MX</h2>
            <div class="text-right">
                <p class="text-[8px] text-slate-500">SALDO FUSDT</p>
                <p id="user-credits" class="text-lg font-bold text-green-400">0.00 fUSDT</p>
            </div>
        </div>
        <div class="bg-slate-900/60 border border-slate-800 p-6 rounded-2xl text-center">
             <p class="text-yellow-500 text-[10px] font-bold mb-4">MERCADO ACTIVO #042</p>
             <h3 class="text-xl italic mb-8">¿Alcanzará el Oro (XAUT) los $4,900.00 USD en los próximos 15 min?</h3>
             <div class="flex space-x-4">
                 <button onclick="alert('Apostaste SÍ')" class="flex-1 bg-green-600 py-4 rounded-xl font-bold">APOSTAR SÍ</button>
                 <button onclick="alert('Apostaste NO')" class="flex-1 bg-red-600 py-4 rounded-xl font-bold">APOSTAR NO</button>
             </div>
        </div>
    </div>

    <script>
        // --- MOTOR BINANCE (SIN LLAVES) ---
        async function getBinancePrice() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await response.json();
                if (data.price) {
                    const price = parseFloat(data.price).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
                    document.getElementById('btc-price').innerText = price;
                }
            } catch (error) {
                console.error("Error en Binance API:", error);
            }
        }

        // Actualizar cada 5 segundos
        setInterval(getBinancePrice, 5000);
        getBinancePrice();

        // --- NAVEGACIÓN ---
        function switchTab(tab) {
            const m = document.getElementById('view-monitor');
            const q = document.getElementById('view-quetza');
            const btnM = document.getElementById('tab-monitor');
            const btnQ = document.getElementById('tab-quetza');

            if (tab === 'monitor') {
                m.style.display = 'block'; q.style.display = 'none';
                btnM.className = 'tab-active py-2'; btnQ.className = 'py-2 text-slate-500';
            } else {
                m.style.display = 'none'; q.style.display = 'block';
                btnQ.className = 'tab-active py-2'; btnM.className = 'py-2 text-slate-500';
            }
        }
    </script>
</body>
</html>

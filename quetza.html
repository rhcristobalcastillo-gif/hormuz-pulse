<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza Forecast | Trading Terminal</title>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; font-weight: 900; }
        body { transition: background-color 1.5s ease-in-out; }
        /* Scrollbar personalizado */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body id="app-body" class="bg-slate-950 text-slate-200 font-mono p-4 max-w-[1600px] mx-auto h-screen flex flex-col overflow-hidden">

    <nav class="flex justify-center space-x-8 mb-6 border-b border-slate-800 pb-2 text-[10px] uppercase tracking-[0.2em] flex-shrink-0">
        <a href="index.html" class="py-2 text-slate-500 hover:text-yellow-500 transition-all">📡 Monitor Global</a>
        <a href="quetza.html" class="tab-active py-2 transition-all">🦅 Quetza Consensus</a>
    </nav>

    <div class="flex flex-col lg:flex-row gap-6 flex-grow overflow-hidden pb-4">
        
        <div class="lg:w-2/3 flex flex-col overflow-hidden">
            <h2 class="text-xl font-black text-yellow-500 uppercase tracking-tighter mb-4 flex-shrink-0">🌎 Mercados de Liquidez Continua</h2>
            
            <div id="markets-container" class="overflow-y-auto pr-2 pb-10 space-y-6 flex-grow">
                </div>
        </div>

        <div class="lg:w-1/3 bg-slate-900 border border-slate-800 rounded-2xl flex flex-col overflow-hidden shadow-2xl relative">
            <div class="p-6 border-b border-slate-800 bg-slate-900 z-10 flex-shrink-0">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-black text-white uppercase tracking-widest">Tu Portafolio</h2>
                    <span class="bg-slate-800 text-yellow-500 px-2 py-1 rounded text-[9px] font-bold tracking-widest uppercase">Nodo Jalisco</span>
                </div>
                
                <div class="bg-slate-950 px-4 py-3 rounded-xl border border-slate-800 shadow-inner text-center mb-4 transition-colors" id="balance-box">
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Saldo Disponible</p>
                    <p class="text-3xl font-black text-green-400"><span class="text-sm text-slate-500 mr-1">fUSDT</span><span id="user-credits">1,000.00</span></p>
                </div>

                <div class="flex justify-between text-center px-4">
                    <div>
                        <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-1">Win Rate</p>
                        <p id="stat-winrate" class="text-lg font-black text-blue-400">0%</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-1">Operaciones</p>
                        <p id="stat-trades" class="text-lg font-black text-white">0</p>
                    </div>
                </div>
            </div>

            <div class="flex-grow overflow-y-auto p-6 space-y-8 bg-slate-900/50">
                <div>
                    <h3 class="text-[10px] text-yellow-500 font-bold uppercase tracking-[0.2em] mb-3 border-b border-slate-800 pb-1">⚡ Posiciones del Ciclo Actual</h3>
                    <div id="open-positions-list" class="space-y-2"></div>
                </div>
                <div>
                    <h3 class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-3 border-b border-slate-800 pb-1">📜 Historial de Liquidación</h3>
                    <div id="history-list" class="space-y-2 opacity-80"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let balance = localStorage.getItem('q_bal_v13') ? parseFloat(localStorage.getItem('q_bal_v13')) : 1000.00;
        let history = JSON.parse(localStorage.getItem('q_hist_v13')) || [];
        let activeBets = JSON.parse(localStorage.getItem('q_active_bets_v13')) || {};

        function updatePortfolio() {
            document.getElementById('user-credits').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            const totalTrades = history.length;
            const wins = history.filter(h => h.win).length;
            document.getElementById('stat-trades').innerText = totalTrades;
            document.getElementById('stat-winrate').innerText = totalTrades > 0 ? `${Math.round((wins / totalTrades) * 100)}%` : `0%`;

            const posList = document.getElementById('open-positions-list');
            const betKeys = Object.keys(activeBets);
            
            if (betKeys.length === 0) {
                posList.innerHTML = `<p class="text-[10px] text-slate-500 italic">Esperando tu inversión...</p>`;
            } else {
                posList.innerHTML = betKeys.map(key => {
                    const bet = activeBets[key];
                    return `
                    <div class="bg-slate-950 border border-slate-800 p-3 rounded-lg flex justify-between items-center animate-pulse">
                        <div>
                            <p class="text-[10px] text-slate-400 truncate w-32 uppercase">${bet.asset}</p>
                            <p class="text-xs font-bold ${bet.side === 'SÍ' ? 'text-green-500' : 'text-red-500'} uppercase tracking-widest">${bet.side}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-white">${bet.amount} fUSDT</p>
                        </div>
                    </div>`;
                }).join('');
            }

            const histList = document.getElementById('history-list');
            if (history.length === 0) {
                histList.innerHTML = `<p class="text-[10px] text-slate-500 italic">No hay historial.</p>`;
            } else {
                histList.innerHTML = history.map(h => `
                    <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-2">
                        <div>
                            <p class="text-[9px] font-bold ${h.win ? 'text-green-500' : 'text-slate-500'} uppercase">${h.win ? 'GANASTE' : 'PERDISTE'} (${h.side})</p>
                            <p class="text-[10px] text-slate-400 truncate w-32 uppercase">${h.asset}</p>
                            ${h.details ? `<p class="text-[8px] text-slate-500 font-mono mt-1">${h.details}</p>` : ''}
                        </div>
                        <p class="text-[11px] font-mono text-white">${h.win ? '+' : '-'}${h.amt} fUSDT</p>
                    </div>`).join('');
            }
        }

        function renderMarkets() {
            let markets = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
            const container = document.getElementById('markets-container');

            if (markets.length === 0) {
                container.innerHTML = `
                <div class="bg-slate-900/50 border border-slate-800 rounded-3xl p-10 flex flex-col items-center justify-center h-64">
                    <span class="text-4xl mb-4 opacity-50">🦅</span>
                    <p class="text-slate-500 uppercase tracking-widest text-sm text-center">No hay mercados abiertos.</p>
                </div>`;
                return;
            }

            container.innerHTML = markets.map(m => {
                const chartHTML = m.symbol ? `
                    <div class="w-full h-48 mb-6 rounded-xl overflow-hidden border border-slate-800 bg-slate-950 shadow-inner pointer-events-auto">
                        <iframe src="https://s.tradingview.com/widgetembed/?symbol=${encodeURIComponent(m.symbol)}&interval=1&theme=dark&style=1&hidesidetoolbar=1" width="100%" height="100%" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
                    </div>
                ` : ``;

                let oracleUI = m.resolution === 'AUTO' 
                    ? `<span id="timer-${m.id}" class="text-blue-400 font-bold font-mono tracking-widest text-sm bg-blue-950/30 px-3 py-1 rounded border border-blue-900">02:00</span>`
                    : `<span class="text-orange-500 font-bold uppercase tracking-widest text-[10px] bg-orange-950/30 px-3 py-1 rounded border border-orange-900">Esperando Juez Admin</span>`;

                return `
                <div class="bg-slate-900/40 border border-slate-800 p-6 rounded-2xl shadow-xl">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                        <div class="flex items-center space-x-2">
                            <span class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] border border-slate-700 px-2 py-1 rounded bg-slate-950">${m.cat}</span>
                            <span class="text-[10px] text-white font-bold uppercase truncate max-w-[150px]">${m.asset}</span>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-[7px] text-slate-500 uppercase tracking-widest mb-1">Cierre de Ciclo</span>
                            ${oracleUI}
                        </div>
                    </div>
                    
                    <h3 class="text-lg font-bold text-white mb-2 leading-tight">${m.question}</h3>
                    ${m.startPrice ? `<p class="text-[10px] text-blue-400 font-mono mb-4 border border-blue-900/50 bg-blue-950/30 inline-block px-2 py-1 rounded">Precio de Entrada: $${m.startPrice}</p>` : ''}
                    ${chartHTML}
                    
                    <div class="flex space-x-3 mt-4">
                        <button onclick="makeBet(${m.id}, 'SÍ', '${m.asset}')" class="flex-1 bg-green-900/80 hover:bg-green-600 text-green-100 border border-green-800 font-black py-3 rounded-xl uppercase text-[10px] tracking-widest transition-all active:scale-95">Invierte SÍ (Sube)</button>
                        <button onclick="makeBet(${m.id}, 'NO', '${m.asset}')" class="flex-1 bg-red-900/80 hover:bg-red-600 text-red-100 border border-red-800 font-black py-3 rounded-xl uppercase text-[10px] tracking-widest transition-all active:scale-95">Invierte NO (Baja)</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function makeBet(marketId, side, assetName) {
            if (balance < 100) return alert("Saldo insuficiente.");
            
            let bet = activeBets[marketId] || { side: side, amount: 0, asset: assetName };
            if(bet.amount > 0 && bet.side !== side) return alert("Ya tienes una posición en el lado contrario.");

            balance -= 100;
            bet.amount += 100; 
            activeBets[marketId] = bet;
            
            localStorage.setItem('q_bal_v13', balance);
            localStorage.setItem('q_active_bets_v13', JSON.stringify(activeBets));
            updatePortfolio(); 
        }

        // ==========================================
        // NUEVO: ORÁCULO DE PRECIOS REALES (BINANCE API)
        // ==========================================
        async function fetchRealPrice(symbol) {
            try {
                // Limpiamos el símbolo para que Binance lo entienda (ej. BINANCE:BTCUSDT -> BTCUSDT)
                let cleanSymbol = symbol.replace('BINANCE:', '').replace('CRYPTO:', '');
                const response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${cleanSymbol}`);
                const data = await response.json();
                if(data.price) return parseFloat(data.price);
                return null;
            } catch (error) {
                console.error("Error contactando al Oráculo de Binance:", error);
                return null;
            }
        }

        function startGlobalClock() {
            setInterval(async () => {
                let markets = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
                let needsRender = false;
                let marketsUpdated = false;

                for (let i = 0; i < markets.length; i++) {
                    let m = markets[i];

                    if (m.resolution === 'AUTO' && m.endTime) {
                        let timeLeft = Math.floor((m.endTime - Date.now()) / 1000);
                        let timerEl = document.getElementById(`timer-${m.id}`);

                        // 1. Tomar fotografía del precio al iniciar el ciclo
                        if (!m.startPrice && m.symbol && m.symbol.includes("BINANCE")) {
                            m.startPrice = await fetchRealPrice(m.symbol);
                            marketsUpdated = true;
                            needsRender = true;
                        }

                        // 2. Llegó a cero: Liquidar con datos reales
                        if (timeLeft <= 0) {
                            await autoLiquidateAndRestart(m, markets);
                            needsRender = true;
                        } else if (timerEl) {
                            let min = Math.floor(timeLeft / 60);
                            let sec = timeLeft % 60;
                            timerEl.innerText = `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
                            if(timeLeft <= 10) timerEl.className = "text-red-500 font-bold font-mono tracking-widest text-sm bg-red-950/30 px-3 py-1 rounded border border-red-900 animate-pulse";
                        }
                    }
                }

                if (marketsUpdated) localStorage.setItem('q_markets_v13', JSON.stringify(markets));
                if (needsRender) renderMarkets();
            }, 1000);
        }

        async function autoLiquidateAndRestart(market, marketsArray) {
            let activeBets = JSON.parse(localStorage.getItem('q_active_bets_v13')) || {};
            let userBet = activeBets[market.id];

            // Obtener el precio final real de la blockchain/exchange
            let finalPrice = null;
            if (market.symbol && market.symbol.includes("BINANCE")) {
                finalPrice = await fetchRealPrice(market.symbol);
            }

            if (userBet) {
                let won = false;
                let resolutionDetails = "Liquidación Aleatoria (Sin Símbolo)";

                // LÓGICA DE VERDAD MATEMÁTICA
                if (market.startPrice && finalPrice) {
                    if (userBet.side === 'SÍ' && finalPrice > market.startPrice) won = true;
                    if (userBet.side === 'NO' && finalPrice < market.startPrice) won = true;
                    // Si el precio queda exactamente igual, la casa gana (pierde el usuario)
                    
                    resolutionDetails = `Entrada: $${market.startPrice} | Salida: $${finalPrice}`;
                } else {
                    // Fallback: Si no escribiste un símbolo de Binance válido, usa el aleatorio
                    won = Math.random() > 0.5; 
                }

                if (won) balance += (userBet.amount * 2);

                history.unshift({ 
                    win: won, 
                    amt: won ? userBet.amount * 2 : userBet.amount, 
                    side: userBet.side, 
                    asset: market.asset,
                    details: resolutionDetails // Guarda la prueba matemática en el historial
                });
                
                if(history.length > 8) history.pop();

                localStorage.setItem('q_bal_v13', balance);
                localStorage.setItem('q_hist_v13', JSON.stringify(history));
                
                delete activeBets[market.id];
                localStorage.setItem('q_active_bets_v13', JSON.stringify(activeBets));
                
                const box = document.getElementById('balance-box');
                box.classList.add(won ? 'bg-green-900/50' : 'bg-red-900/50');
                setTimeout(() => box.classList.remove('bg-green-900/50', 'bg-red-900/50'), 1000);
                
                updatePortfolio();
            }

            // Reiniciar el reloj y borrar el precio de inicio para tomar uno nuevo en el siguiente ciclo
            market.endTime = Date.now() + 120000;
            market.startPrice = null; 
            
            localStorage.setItem('q_markets_v13', JSON.stringify(marketsArray));
        }

        setInterval(() => {
            let newBal = parseFloat(localStorage.getItem('q_bal_v13')) || 1000;
            let newBetsStr = localStorage.getItem('q_active_bets_v13');
            let newMarketsStr = localStorage.getItem('q_markets_v13');
            
            let currentBetsStr = JSON.stringify(activeBets);
            let currentMarkets = (JSON.parse(localStorage.getItem('q_markets_v13')) || []).length;
            let newMarketsCount = (JSON.parse(newMarketsStr) || []).length;

            if (newBal !== balance || newBetsStr !== currentBetsStr || newMarketsCount !== currentMarkets) {
                balance = newBal;
                activeBets = JSON.parse(newBetsStr) || {};
                updatePortfolio();
                renderMarkets();
            }
        }, 1500);

        window.onload = () => {
            updatePortfolio();
            renderMarkets();
            startGlobalClock();
        };
    </script>
    </script>
</body>
</html>

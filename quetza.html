<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza MX | Terminal</title>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; font-weight: 900; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #333333; }
        ::-webkit-scrollbar-thumb { background: #425465; border-radius: 10px; }
        /* Ocultar scroll en filtros */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body id="app-body" class="bg-gradient-to-br from-[#333333] to-[#2a3642] text-slate-200 font-sans p-3 lg:p-4 max-w-[1400px] mx-auto min-h-screen lg:h-screen flex flex-col lg:overflow-hidden relative z-0">

    <nav class="relative h-20 flex justify-between items-center mb-6 border-b border-white/10 flex-shrink-0 pt-4">
        <a href="index.html" class="absolute left-0 top-1/2 -translate-y-1/2 z-20 flex items-center hover:opacity-80 transition-opacity mt-2">
            <img src="(COPY) Logotipo 500x500 px.png" alt="Logo" class="w-16 h-16 lg:w-24 lg:h-24 object-contain drop-shadow-xl">
            <span class="ml-3 text-white font-black tracking-tighter text-lg lg:text-xl hidden md:block uppercase mt-1">Quetza MX</span>
        </a>

        <div class="ml-auto flex space-x-4 lg:space-x-8 text-[10px] lg:text-[11px] uppercase tracking-[0.2em] items-center">
            <a href="index.html" class="py-2 text-slate-400 hover:text-white transition-all">Monitor</a>
            <a href="quetza.html" class="tab-active py-2">Quetza Consensus</a>
        </div>
    </nav>

    <div class="flex flex-col lg:flex-row gap-6 flex-grow lg:overflow-hidden pb-4">
        
        <div class="lg:w-2/3 flex flex-col lg:overflow-hidden">
            <h2 class="text-xl font-black text-white uppercase tracking-tighter mb-4 flex-shrink-0 px-1">🌎 Mercados de Liquidez</h2>
            
            <div class="flex space-x-2 mb-4 overflow-x-auto pb-2 flex-shrink-0 hide-scroll px-1">
                <button id="filter-ALL" onclick="setMarketFilter('ALL')" class="bg-yellow-500 text-black px-4 py-2 rounded-[5px] text-[10px] uppercase font-black tracking-widest transition-colors whitespace-nowrap shadow-lg">Todos</button>
                <button id="filter-CRIPTO" onclick="setMarketFilter('CRIPTO')" class="bg-[#2a3642] text-slate-400 hover:text-white px-4 py-2 rounded-[5px] text-[10px] uppercase font-bold tracking-widest border border-[#425465] transition-colors whitespace-nowrap">Finanzas & Cripto</button>
                <button id="filter-DEPORTES" onclick="setMarketFilter('DEPORTES')" class="bg-[#2a3642] text-slate-400 hover:text-white px-4 py-2 rounded-[5px] text-[10px] uppercase font-bold tracking-widest border border-[#425465] transition-colors whitespace-nowrap">Deportes</button>
                <button id="filter-POLITICA" onclick="setMarketFilter('POLITICA')" class="bg-[#2a3642] text-slate-400 hover:text-white px-4 py-2 rounded-[5px] text-[10px] uppercase font-bold tracking-widest border border-[#425465] transition-colors whitespace-nowrap">Política</button>
            </div>

            <div id="markets-container" class="lg:overflow-y-auto pr-0 lg:pr-2 pb-6 lg:pb-10 space-y-6 flex-grow">
                </div>
        </div>

        <div class="lg:w-1/3 bg-[#1e272e] border border-[#425465] rounded-[10px] flex flex-col lg:overflow-hidden shadow-2xl relative mb-10 lg:mb-0">
            <div class="p-5 lg:p-6 border-b border-[#425465] bg-[#1e272e] z-10 flex-shrink-0">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-black text-white uppercase tracking-widest">Tu Portafolio</h2>
                    <span class="bg-[#2a3642] text-yellow-500 border border-[#425465] px-2 py-1 rounded-[5px] text-[9px] font-bold tracking-widest uppercase">Nodo Jalisco</span>
                </div>
                
                <div class="bg-[#2a3642] px-4 py-3 rounded-[10px] border border-[#425465] shadow-inner text-center mb-4 transition-all duration-500" id="balance-box">
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1">Saldo Disponible</p>
                    <p class="text-3xl font-black text-[#10b981] font-mono"><span class="text-sm text-slate-400 mr-1">fUSDT</span><span id="user-credits">1,000.00</span></p>
                    
                    <div id="recharge-container" class="hidden mt-3">
                        <button onclick="rechargeDemo()" class="w-full bg-gradient-to-r from-[#1f6838] to-[#10b981] hover:from-[#164b28] hover:to-[#059669] text-white font-black py-2 rounded-[5px] uppercase text-[10px] tracking-widest shadow-lg transition-all animate-bounce border border-[#10b981]">
                            + Recargar Demo (1,000)
                        </button>
                    </div>
                </div>

                <div class="flex justify-between text-center px-4">
                    <div>
                        <p class="text-[9px] text-slate-400 uppercase tracking-widest mb-1">Win Rate</p>
                        <p id="stat-winrate" class="text-lg font-black text-yellow-500 font-mono">0%</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-400 uppercase tracking-widest mb-1">Operaciones</p>
                        <p id="stat-trades" class="text-lg font-black text-white font-mono">0</p>
                    </div>
                </div>
            </div>

            <div class="flex-grow lg:overflow-y-auto p-5 lg:p-6 space-y-8 bg-[#1e272e]">
                <div>
                    <h3 class="text-[10px] text-yellow-500 font-bold uppercase tracking-[0.2em] mb-3 border-b border-[#425465] pb-1">⚡ Posiciones del Ciclo</h3>
                    <div id="open-positions-list" class="space-y-2"></div>
                </div>
                <div>
                    <h3 class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-3 border-b border-[#425465] pb-1">📜 Historial</h3>
                    <div id="history-list" class="space-y-2 opacity-80"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = localStorage.getItem('q_bal_v13') ? parseFloat(localStorage.getItem('q_bal_v13')) : 1000.00;
        let history = JSON.parse(localStorage.getItem('q_hist_v13')) || [];
        let activeBets = JSON.parse(localStorage.getItem('q_active_bets_v13')) || {};
        let currentMarketsCount = 0; 
        let currentMarketFilter = 'ALL';

        function setMarketFilter(filterType) {
            currentMarketFilter = filterType;
            const tabs = ['ALL', 'CRIPTO', 'DEPORTES', 'POLITICA'];
            tabs.forEach(t => {
                const btn = document.getElementById('filter-' + t);
                if(btn) {
                    if(t === filterType) {
                        btn.className = "bg-yellow-500 text-black px-4 py-2 rounded-[5px] text-[10px] uppercase font-black tracking-widest transition-colors whitespace-nowrap shadow-lg";
                    } else {
                        btn.className = "bg-[#2a3642] text-slate-400 hover:text-white px-4 py-2 rounded-[5px] text-[10px] uppercase font-bold tracking-widest border border-[#425465] transition-colors whitespace-nowrap";
                    }
                }
            });
            renderMarkets();
        }

        function rechargeDemo() {
            balance += 1000;
            localStorage.setItem('q_bal_v13', balance);
            updatePortfolio();
            const box = document.getElementById('balance-box');
            box.classList.add('bg-green-900/50');
            setTimeout(() => box.classList.remove('bg-green-900/50'), 1000);
        }

        function updatePortfolio() {
            document.getElementById('user-credits').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            const totalTrades = history.length;
            const wins = history.filter(h => h.win).length;
            document.getElementById('stat-trades').innerText = totalTrades;
            document.getElementById('stat-winrate').innerText = totalTrades > 0 ? `${Math.round((wins / totalTrades) * 100)}%` : `0%`;

            // Lógica botón recarga
            const rechargeBtn = document.getElementById('recharge-container');
            if (balance < 100) rechargeBtn.classList.remove('hidden');
            else rechargeBtn.classList.add('hidden');

            const posList = document.getElementById('open-positions-list');
            const betKeys = Object.keys(activeBets);
            posList.innerHTML = betKeys.length === 0 ? `<p class="text-[10px] text-slate-500 italic">Esperando tu inversión...</p>` : betKeys.map(key => {
                const bet = activeBets[key];
                return `<div class="bg-[#2a3642] border border-[#425465] p-3 rounded-[10px] flex justify-between items-center animate-pulse gap-3">
                    <div class="flex-1 min-w-0"><p class="text-[10px] text-slate-300 truncate uppercase">${bet.asset}</p><p class="text-xs font-bold ${bet.side === 'SÍ' ? 'text-green-400' : 'text-red-400'} uppercase">${bet.side}</p></div>
                    <div class="text-right pl-2 border-l border-[#425465]"><p class="text-sm font-black text-white font-mono">${bet.amount}</p></div>
                </div>`;
            }).join('');

            const histList = document.getElementById('history-list');
            histList.innerHTML = history.length === 0 ? `<p class="text-[10px] text-slate-500 italic">No hay historial.</p>` : history.map(h => `
                <div class="flex justify-between items-center border-b border-[#425465] pb-2 mb-2 gap-2 hover:bg-[#2a3642] p-1 rounded-[5px] transition-colors">
                    <div class="flex-1 min-w-0"><p class="text-[9px] font-bold ${h.win ? 'text-green-400' : 'text-slate-500'} uppercase">${h.win ? 'GANASTE' : 'PERDISTE'}</p><p class="text-[10px] text-slate-300 truncate uppercase">${h.asset}</p></div>
                    <p class="text-[11px] font-mono font-bold text-white">${h.win ? '+' : '-'}${h.amt}</p>
                </div>`).join('');
        }

        function renderMarkets() {
            let allMarkets = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
            currentMarketsCount = allMarkets.length;
            const container = document.getElementById('markets-container');

            let markets = allMarkets;
            if(currentMarketFilter !== 'ALL') {
                markets = allMarkets.filter(m => {
                    let c = (m.cat || '').toUpperCase();
                    if(currentMarketFilter === 'CRIPTO' && (c.includes('CRIPTO') || c.includes('FINANZA') || c.includes('WEB3') || c.includes('ORO') || c.includes('METAL'))) return true;
                    if(currentMarketFilter === 'DEPORTES' && (c.includes('DEPORT') || c.includes('FUTBOL') || c.includes('LIGA') || c.includes('BOX') || c.includes('UFC'))) return true;
                    if(currentMarketFilter === 'POLITICA' && (c.includes('POLITIC') || c.includes('ELECCION') || c.includes('PRESIDENT'))) return true;
                    return false;
                });
            }

            if (markets.length === 0) {
                container.innerHTML = `<div class="bg-[#1e272e] border border-[#425465] rounded-[10px] p-10 flex flex-col items-center justify-center h-64"><span class="text-4xl mb-4 opacity-50">🦅</span><p class="text-slate-400 uppercase tracking-widest text-sm">No hay mercados en esta categoría.</p></div>`;
                return;
            }

            container.innerHTML = markets.map(m => {
                const chart = m.symbol ? `<div class="w-full h-64 md:h-72 mb-6 rounded-[10px] overflow-hidden border border-[#425465] bg-[#121212] shadow-inner"><iframe src="https://s.tradingview.com/widgetembed/?symbol=${encodeURIComponent(m.symbol)}&interval=1&theme=dark&style=1&hidesidetoolbar=1" width="100%" height="100%" frameborder="0"></iframe></div>` : ``;
                let oracleUI = "";
                if (m.resolution === 'AUTO' && m.endTime) {
                    let t = Math.max(0, Math.floor((m.endTime - Date.now()) / 1000));
                    oracleUI = `<span id="timer-${m.id}" class="text-yellow-500 font-bold font-mono tracking-widest text-sm bg-yellow-500/10 px-3 py-1 rounded-[5px] border border-yellow-500/30">${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}</span>`;
                } else { oracleUI = `<span class="text-orange-400 font-bold uppercase tracking-widest text-[10px] bg-orange-900/30 px-3 py-1 rounded-[5px] border border-orange-500/30">Juez Admin</span>`; }

                return `<div class="bg-[#1e272e] border border-[#425465] p-4 lg:p-6 rounded-[10px] shadow-xl hover:bg-[#222d36] transition-colors">
                    <div class="flex justify-between items-center mb-4 border-b border-[#425465] pb-3">
                        <div class="flex-1 min-w-0 pr-2"><span class="text-[9px] text-slate-300 font-bold uppercase tracking-[0.2em] border border-[#425465] px-2 py-1 rounded-[5px] bg-[#2a3642]">${m.cat}</span><h3 class="text-[10px] text-white font-bold uppercase truncate mt-2">${m.asset}</h3></div>
                        <div class="flex flex-col items-end">${oracleUI}</div>
                    </div>
                    <h3 class="text-base lg:text-lg font-black text-white mb-2 leading-tight">${m.question}</h3>
                    <p id="price-tag-${m.id}" class="text-[10px] text-yellow-500 font-mono mb-4 border border-[#425465] bg-[#2a3642] px-3 py-1 rounded-[5px] inline-block">${m.startPrice ? `Entrada: $${m.startPrice}` : 'Calculando...'}</p>
                    ${chart}
                    <div class="flex space-x-2 lg:space-x-3 mt-4">
                        <button onclick="makeBet(${m.id}, 'SÍ', '${m.asset}')" class="flex-1 bg-[#1f6838] hover:bg-[#164b28] text-white font-black py-3 lg:py-4 rounded-[10px] uppercase text-[10px] tracking-widest shadow-lg transition-all active:scale-95">SÍ</button>
                        <button onclick="makeBet(${m.id}, 'NO', '${m.asset}')" class="flex-1 bg-red-700 hover:bg-red-800 text-white font-black py-3 lg:py-4 rounded-[10px] uppercase text-[10px] tracking-widest shadow-lg transition-all active:scale-95">NO</button>
                    </div>
                </div>`;
            }).join('');
        }

        function makeBet(marketId, side, assetName) {
            if (balance < 100) return alert("Saldo insuficiente.");
            let bet = activeBets[marketId] || { side: side, amount: 0, asset: assetName };
            if(bet.amount > 0 && bet.side !== side) return alert("Ya tienes una posición contraria.");
            balance -= 100; bet.amount += 100; activeBets[marketId] = bet;
            localStorage.setItem('q_bal_v13', balance);
            localStorage.setItem('q_active_bets_v13', JSON.stringify(activeBets));
            updatePortfolio(); 
        }

        async function fetchRealPrice(symbol) {
            try {
                let s = symbol.replace('BINANCE:', '').replace('CRYPTO:', '');
                const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${s}`);
                const d = await r.json(); return d.price ? parseFloat(d.price) : null;
            } catch (e) { return null; }
        }

        function startGlobalClock() {
            const tick = async () => {
                let mk = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
                let upd = false;
                for (let m of mk) {
                    if (m.resolution === 'AUTO' && m.endTime) {
                        let t = Math.max(0, Math.floor((m.endTime - Date.now()) / 1000));
                        let tEl = document.getElementById(`timer-${m.id}`), pEl = document.getElementById(`price-tag-${m.id}`);
                        if (!m.startPrice && m.symbol) { m.startPrice = await fetchRealPrice(m.symbol); upd = true; }
                        if (t <= 0) await autoLiquidate(m, mk);
                        else if (tEl) tEl.innerText = `${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`;
                    }
                }
                if (upd) localStorage.setItem('q_markets_v13', JSON.stringify(mk));
            };
            tick(); setInterval(tick, 1000);
        }

        async function autoLiquidate(market, mkArr) {
            let ab = JSON.parse(localStorage.getItem('q_active_bets_v13')) || {};
            let ub = ab[market.id], fP = market.symbol ? await fetchRealPrice(market.symbol) : null;
            if (ub) {
                let won = (market.startPrice && fP) ? (ub.side==='SÍ' ? fP > market.startPrice : fP < market.startPrice) : Math.random() > 0.5;
                if (won) balance += (ub.amount * 2);
                history.unshift({ win: won, amt: won ? ub.amount * 2 : ub.amount, side: ub.side, asset: market.asset });
                if(history.length > 8) history.pop();
                localStorage.setItem('q_bal_v13', balance); localStorage.setItem('q_hist_v13', JSON.stringify(history));
                delete ab[market.id]; localStorage.setItem('q_active_bets_v13', JSON.stringify(ab));
                updatePortfolio();
            }
            market.endTime = Date.now() + 120000; market.startPrice = null;
            localStorage.setItem('q_markets_v13', JSON.stringify(mkArr));
        }

        setInterval(() => {
            let storedBal = localStorage.getItem('q_bal_v13');
            // Aquí le decimos explícitamente: ¡Si es 0, respeta el 0!
            let nB = storedBal !== null ? parseFloat(storedBal) : 1000;
            let nA = localStorage.getItem('q_active_bets_v13');
            let nM = (JSON.parse(localStorage.getItem('q_markets_v13')) || []).length;

            if (nB !== balance || nA !== JSON.stringify(activeBets)) { 
                balance = nB; 
                activeBets = JSON.parse(nA) || {}; 
                updatePortfolio(); 
            }
            if (nM !== currentMarketsCount) { renderMarkets(); }
        }, 1500);

        window.onload = () => {
            let initialBal = localStorage.getItem('q_bal_v13');
            balance = initialBal !== null ? parseFloat(initialBal) : 1000;
            updatePortfolio();
            renderMarkets();
            startGlobalClock();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza | Trading Terminal</title>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; font-weight: 900; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body id="app-body" class="bg-slate-950 text-slate-200 font-mono p-3 lg:p-4 max-w-[1600px] mx-auto min-h-screen lg:h-screen flex flex-col lg:overflow-hidden">

    <nav class="flex justify-center space-x-6 lg:space-x-8 mb-6 border-b border-slate-800 pb-2 text-[9px] lg:text-[10px] uppercase tracking-[0.2em] flex-shrink-0 pt-4">
        <a href="index.html" class="py-2 text-slate-500 hover:text-yellow-500 transition-all">📡 Monitor Global</a>
        <a href="quetza.html" class="tab-active py-2 transition-all">🦅 Quetza Consensus</a>
    </nav>

    <div class="flex flex-col lg:flex-row gap-6 flex-grow lg:overflow-hidden pb-4">
        <div class="lg:w-2/3 flex flex-col lg:overflow-hidden">
            <h2 class="text-xl font-black text-yellow-500 uppercase tracking-tighter mb-4 flex-shrink-0">🌎 Mercados de Liquidez</h2>
            <div id="markets-container" class="lg:overflow-y-auto pr-0 lg:pr-2 pb-10 space-y-6 flex-grow"></div>
        </div>

        <div class="lg:w-1/3 bg-slate-900 border border-slate-800 rounded-2xl flex flex-col lg:overflow-hidden shadow-2xl relative mb-10 lg:mb-0">
            <div class="p-5 lg:p-6 border-b border-slate-800 bg-slate-900 flex-shrink-0">
                <h2 class="text-lg font-black text-white uppercase mb-4">Tu Portafolio</h2>
                <div class="bg-slate-950 px-4 py-3 rounded-xl border border-slate-800 text-center mb-4" id="balance-box">
                    <p class="text-[10px] text-slate-500 uppercase mb-1">Saldo Disponible</p>
                    <p class="text-3xl font-black text-green-400">$<span id="user-credits">1,000.00</span></p>
                </div>
                <div class="flex justify-between text-center">
                    <div><p class="text-[9px] text-slate-500 uppercase mb-1">Win Rate</p><p id="stat-winrate" class="text-lg font-black text-blue-400">0%</p></div>
                    <div><p class="text-[9px] text-slate-500 uppercase mb-1">Trades</p><p id="stat-trades" class="text-lg font-black text-white">0</p></div>
                </div>
            </div>
            <div class="flex-grow lg:overflow-y-auto p-5 lg:p-6 space-y-8 bg-slate-900/50">
                <div><h3 class="text-[10px] text-yellow-500 font-bold uppercase mb-3 border-b border-slate-800 pb-1">⚡ Posiciones</h3><div id="open-positions-list" class="space-y-2"></div></div>
                <div><h3 class="text-[10px] text-slate-400 font-bold uppercase mb-3 border-b border-slate-800 pb-1">📜 Historial</h3><div id="history-list" class="space-y-2 opacity-80"></div></div>
            </div>
        </div>
    </div>

    <script>
        let balance = localStorage.getItem('q_bal_v13') ? parseFloat(localStorage.getItem('q_bal_v13')) : 1000.00;
        let history = JSON.parse(localStorage.getItem('q_hist_v13')) || [];
        let activeBets = JSON.parse(localStorage.getItem('q_active_bets_v13')) || {};
        let currentMarketsCount = 0;

        function updatePortfolio() {
            document.getElementById('user-credits').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            const totalTrades = history.length;
            const wins = history.filter(h => h.win).length;
            document.getElementById('stat-trades').innerText = totalTrades;
            document.getElementById('stat-winrate').innerText = totalTrades > 0 ? `${Math.round((wins / totalTrades) * 100)}%` : `0%`;

            const posList = document.getElementById('open-positions-list');
            const betKeys = Object.keys(activeBets);
            posList.innerHTML = betKeys.length === 0 ? `<p class="text-[10px] text-slate-500 italic">Sin apuestas...</p>` : betKeys.map(key => {
                const bet = activeBets[key];
                return `<div class="bg-slate-950 border border-slate-800 p-3 rounded-lg flex justify-between items-center animate-pulse gap-3">
                    <div class="flex-1 min-w-0"><p class="text-[10px] text-slate-400 truncate uppercase">${bet.asset}</p><p class="text-xs font-bold ${bet.side === 'SÍ' ? 'text-green-500' : 'text-red-500'} uppercase">${bet.side}</p></div>
                    <div class="text-right whitespace-nowrap"><p class="text-sm font-black text-white">${bet.amount} <span class="text-[9px] text-slate-500">fUSDT</span></p></div>
                </div>`;
            }).join('');

            const histList = document.getElementById('history-list');
            histList.innerHTML = history.length === 0 ? `<p class="text-[10px] text-slate-500 italic">Vacío...</p>` : history.map(h => `
                <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-2 gap-2">
                    <div class="flex-1 min-w-0"><p class="text-[9px] font-bold ${h.win ? 'text-green-500' : 'text-slate-500'} uppercase">${h.win ? 'GOL' : 'OUT'}</p><p class="text-[10px] text-slate-400 truncate uppercase">${h.asset}</p></div>
                    <p class="text-[11px] font-mono text-white">${h.win ? '+' : '-'}${h.amt}</p>
                </div>`).join('');
        }

        function renderMarkets() {
            let markets = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
            currentMarketsCount = markets.length;
            const container = document.getElementById('markets-container');

            if (markets.length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-center py-10 uppercase tracking-widest text-xs">Cerrado</p>`;
                return;
            }

            container.innerHTML = markets.map(m => {
                const chartHTML = m.symbol ? `<div class="w-full h-64 md:h-72 mb-6 rounded-xl overflow-hidden border border-slate-800 bg-slate-950"><iframe src="https://s.tradingview.com/widgetembed/?symbol=${encodeURIComponent(m.symbol)}&interval=1&theme=dark&style=1&hidesidetoolbar=1" width="100%" height="100%" frameborder="0"></iframe></div>` : ``;
                
                let oracleUI = "";
                if (m.resolution === 'AUTO' && m.endTime) {
                    let timeLeft = Math.floor((m.endTime - Date.now()) / 1000);
                    if (timeLeft < 0) timeLeft = 0;
                    let min = Math.floor(timeLeft / 60), sec = timeLeft % 60;
                    let timeStr = `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
                    oracleUI = `<span id="timer-${m.id}" class="text-blue-400 font-bold font-mono tracking-widest text-sm bg-blue-950/30 px-3 py-1 rounded border border-blue-900">${timeStr}</span>`;
                } else {
                    oracleUI = `<span class="text-orange-500 font-bold uppercase tracking-widest text-[10px] bg-orange-950/30 px-3 py-1 rounded border border-orange-900">Juez Admin</span>`;
                }

                return `
                <div class="bg-slate-900/40 border border-slate-800 p-4 lg:p-6 rounded-2xl shadow-xl">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                        <div class="flex items-center space-x-2 flex-1 min-w-0 pr-2">
                            <span class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] border border-slate-700 px-2 py-1 rounded bg-slate-950">${m.cat}</span>
                            <span class="text-[10px] text-white font-bold uppercase truncate">${m.asset}</span>
                        </div>
                        <div class="flex flex-col items-end flex-shrink-0">${oracleUI}</div>
                    </div>
                    <h3 class="text-base lg:text-lg font-bold text-white mb-2 leading-tight">${m.question}</h3>
                    <p id="price-tag-${m.id}" class="text-[10px] text-blue-400 font-mono mb-4 border border-blue-900/50 bg-blue-950/30 inline-block px-2 py-1 rounded">
                        ${m.startPrice ? `In: $${m.startPrice}` : 'Calculando...'}
                    </p>
                    ${chartHTML}
                    <div class="flex space-x-2 lg:space-x-3 mt-4">
                        <button onclick="makeBet(${m.id}, 'SÍ', '${m.asset}')" class="flex-1 bg-green-900/80 text-white font-black py-3 rounded-xl uppercase text-[10px] tracking-widest shadow-lg">SÍ</button>
                        <button onclick="makeBet(${m.id}, 'NO', '${m.asset}')" class="flex-1 bg-red-900/80 text-white font-black py-3 rounded-xl uppercase text-[10px] tracking-widest shadow-lg">NO</button>
                    </div>
                </div>`;
            }).join('');
        }

        function makeBet(marketId, side, assetName) {
            if (balance < 100) return alert("Pobre!");
            let bet = activeBets[marketId] || { side: side, amount: 0, asset: assetName };
            if(bet.amount > 0 && bet.side !== side) return alert("No puedes jugar a dos bandas.");
            balance -= 100; bet.amount += 100; activeBets[marketId] = bet;
            localStorage.setItem('q_bal_v13', balance);
            localStorage.setItem('q_active_bets_v13', JSON.stringify(activeBets));
            updatePortfolio(); 
        }

        async function fetchRealPrice(symbol) {
            try {
                let s = symbol.replace('BINANCE:', '');
                const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${s}`);
                const d = await r.json(); return parseFloat(d.price);
            } catch (e) { return null; }
        }

        function startGlobalClock() {
            const tick = async () => {
                let markets = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
                let upd = false;
                for (let m of markets) {
                    if (m.resolution === 'AUTO' && m.endTime) {
                        let t = Math.floor((m.endTime - Date.now()) / 1000);
                        let tEl = document.getElementById(`timer-${m.id}`), pEl = document.getElementById(`price-tag-${m.id}`);
                        if (!m.startPrice && m.symbol && m.symbol.includes("BINANCE")) {
                            m.startPrice = await fetchRealPrice(m.symbol); upd = true;
                            if (pEl) pEl.innerText = `In: $${m.startPrice}`;
                        }
                        if (t <= 0) await autoLiquidateAndRestart(m, markets);
                        else if (tEl) {
                            let min = Math.floor(t/60), sec = t%60;
                            tEl.innerText = `${min<10?'0':''}${min}:${sec<10?'0':''}${sec}`;
                        }
                    }
                }
                if (upd) localStorage.setItem('q_markets_v13', JSON.stringify(markets));
            };
            tick(); setInterval(tick, 1000);
        }

        async function autoLiquidateAndRestart(market, marketsArray) {
            let activeBets = JSON.parse(localStorage.getItem('q_active_bets_v13')) || {};
            let userBet = activeBets[market.id];
            let finalPrice = market.symbol ? await fetchRealPrice(market.symbol) : null;
            if (userBet) {
                let won = (market.startPrice && finalPrice) ? (userBet.side==='SÍ'?finalPrice>market.startPrice:finalPrice<market.startPrice) : Math.random()>0.5;
                if (won) balance += (userBet.amount * 2);
                history.unshift({ win: won, amt: won?userBet.amount*2:userBet.amount, side: userBet.side, asset: market.asset });
                if(history.length > 8) history.pop();
                localStorage.setItem('q_bal_v13', balance);
                localStorage.setItem('q_hist_v13', JSON.stringify(history));
                delete activeBets[market.id];
                localStorage.setItem('q_active_bets_v13', JSON.stringify(activeBets));
                updatePortfolio();
            }
            market.endTime = Date.now() + 120000; market.startPrice = null; 
            localStorage.setItem('q_markets_v13', JSON.stringify(marketsArray));
        }

        setInterval(() => {
            let nB = parseFloat(localStorage.getItem('q_bal_v13')) || 1000, nA = localStorage.getItem('q_active_bets_v13'), nM = (JSON.parse(localStorage.getItem('q_markets_v13')) || []).length;
            if (nB !== balance || nA !== JSON.stringify(activeBets)) { balance = nB; activeBets = JSON.parse(nA) || {}; updatePortfolio(); }
            if (nM !== currentMarketsCount) renderMarkets();
        }, 1500);

        window.onload = () => { updatePortfolio(); renderMarkets(); startGlobalClock(); };
    </script>
</body>
</html>

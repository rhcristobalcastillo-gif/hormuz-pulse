<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza | Trading Terminal</title>
    <style>
        /* Estilo de pestaña activa (Rojo y Blanco) */
        .tab-active { border-bottom: 3px solid #ef4444; color: #ffffff; font-weight: 900; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 10px; }
    </style>
</head>
<body id="app-body" class="bg-[#121212] text-[#b3b3b3] font-mono p-3 lg:p-4 max-w-[1600px] mx-auto min-h-screen lg:h-screen flex flex-col lg:overflow-hidden relative z-0">

    <div class="fixed top-0 left-0 w-full h-[60vh] bg-gradient-to-b from-[#8B0000] to-transparent -z-10 pointer-events-none opacity-40"></div>

    <nav class="flex justify-center space-x-6 lg:space-x-8 mb-6 border-b border-white/10 pb-2 text-[9px] lg:text-[10px] uppercase tracking-[0.2em] flex-shrink-0 pt-4">
        <a href="index.html" class="py-2 text-[#b3b3b3] hover:text-white transition-all">📡 Monitor Global</a>
        <a href="quetza.html" class="tab-active py-2 transition-all">🦅 Quetza Consensus</a>
    </nav>

    <div class="flex flex-col lg:flex-row gap-6 flex-grow lg:overflow-hidden pb-4">
        
        <div class="lg:w-2/3 flex flex-col lg:overflow-hidden">
            <h2 class="text-xl font-black text-white uppercase tracking-tighter mb-4 flex-shrink-0">🌎 Mercados de Liquidez</h2>
            
            <div id="markets-container" class="lg:overflow-y-auto pr-0 lg:pr-2 pb-6 lg:pb-10 space-y-6 flex-grow">
                </div>
        </div>

        <div class="lg:w-1/3 bg-[#181818] border border-white/5 rounded-2xl flex flex-col lg:overflow-hidden shadow-2xl relative mb-10 lg:mb-0">
            <div class="p-5 lg:p-6 border-b border-white/10 bg-[#181818] z-10 flex-shrink-0">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-black text-white uppercase tracking-widest">Tu Portafolio</h2>
                    <span class="bg-[#121212] text-white/50 border border-white/10 px-2 py-1 rounded-full text-[9px] font-bold tracking-widest uppercase">Nodo Jalisco</span>
                </div>
                
                <div class="bg-[#121212] px-4 py-3 rounded-xl border border-white/5 shadow-inner text-center mb-4 transition-colors" id="balance-box">
                    <p class="text-[10px] text-[#b3b3b3] uppercase tracking-widest mb-1">Saldo Disponible</p>
                    <p class="text-3xl font-black text-white"><span class="text-sm text-[#b3b3b3] mr-1">fUSDT</span><span id="user-credits">1,000.00</span></p>
                </div>

                <div class="flex justify-between text-center px-4">
                    <div>
                        <p class="text-[9px] text-[#b3b3b3] uppercase tracking-widest mb-1">Win Rate</p>
                        <p id="stat-winrate" class="text-lg font-black text-green-500">0%</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-[#b3b3b3] uppercase tracking-widest mb-1">Operaciones</p>
                        <p id="stat-trades" class="text-lg font-black text-white">0</p>
                    </div>
                </div>
            </div>

            <div class="flex-grow lg:overflow-y-auto p-5 lg:p-6 space-y-8 bg-[#181818]">
                <div>
                    <h3 class="text-[10px] text-white font-bold uppercase tracking-[0.2em] mb-3 border-b border-white/10 pb-1">⚡ Posiciones del Ciclo</h3>
                    <div id="open-positions-list" class="space-y-2"></div>
                </div>
                <div>
                    <h3 class="text-[10px] text-[#b3b3b3] font-bold uppercase tracking-[0.2em] mb-3 border-b border-white/10 pb-1">📜 Historial de Liquidación</h3>
                    <div id="history-list" class="space-y-2 opacity-80"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let balance = localStorage.getItem('q_bal_v13') ? parseFloat(localStorage.getItem('q_bal_v13')) : 1000.00;
        let history = JSON.parse(localStorage.getItem('q_hist_v13')) || [];
        let activeBets = JSON.parse(localStorage.getItem('q_active_bets_v13')) || {};
        let currentMarketsCount = 0; 

        function updatePortfolio() {
            document.getElementById('user-credits').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            const totalTrades = history.length;
            const wins = history.filter(h => h.win).length;
            document.getElementById('stat-trades').innerText = totalTrades;
            document.getElementById('stat-winrate').innerText = totalTrades > 0 ? `${Math.round((wins / totalTrades) * 100)}%` : `0%`;

            const posList = document.getElementById('open-positions-list');
            const betKeys = Object.keys(activeBets);
            
            if (betKeys.length === 0) {
                posList.innerHTML = `<p class="text-[10px] text-[#b3b3b3] italic">Esperando tu inversión...</p>`;
            } else {
                posList.innerHTML = betKeys.map(key => {
                    const bet = activeBets[key];
                    return `
                    <div class="bg-[#121212] border border-white/5 p-3 rounded-lg flex flex-row justify-between items-center animate-pulse gap-3">
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] text-[#b3b3b3] truncate uppercase" title="${bet.asset}">${bet.asset}</p>
                            <p class="text-xs font-bold ${bet.side === 'SÍ' ? 'text-green-500' : 'text-red-500'} uppercase tracking-widest">${bet.side}</p>
                        </div>
                        <div class="text-right whitespace-nowrap pl-2 border-l border-white/10">
                            <p class="text-sm font-black text-white">${bet.amount} <span class="text-[9px] text-[#b3b3b3]">fUSDT</span></p>
                        </div>
                    </div>`;
                }).join('');
            }

            const histList = document.getElementById('history-list');
            if (history.length === 0) {
                histList.innerHTML = `<p class="text-[10px] text-[#b3b3b3] italic">No hay historial.</p>`;
            } else {
                histList.innerHTML = history.map(h => `
                    <div class="flex flex-row justify-between items-center border-b border-white/5 pb-2 mb-2 gap-2 hover:bg-[#282828] p-1 rounded transition-colors">
                        <div class="flex-1 min-w-0">
                            <p class="text-[9px] font-bold ${h.win ? 'text-green-500' : 'text-[#b3b3b3]'} uppercase">${h.win ? 'GANASTE' : 'PERDISTE'} (${h.side})</p>
                            <p class="text-[10px] text-white truncate uppercase">${h.asset}</p>
                            ${h.details ? `<p class="text-[8px] text-[#b3b3b3] font-mono mt-1">${h.details}</p>` : ''}
                        </div>
                        <div class="text-right whitespace-nowrap">
                            <p class="text-[11px] font-mono text-white">${h.win ? '+' : '-'}${h.amt} <span class="text-[8px] text-[#b3b3b3]">fUSDT</span></p>
                        </div>
                    </div>`).join('');
            }
        }

        function renderMarkets() {
            let markets = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
            currentMarketsCount = markets.length;
            const container = document.getElementById('markets-container');

            if (markets.length === 0) {
                container.innerHTML = `
                <div class="bg-[#181818] border border-white/5 rounded-3xl p-10 flex flex-col items-center justify-center h-64">
                    <span class="text-4xl mb-4 opacity-50">🦅</span>
                    <p class="text-[#b3b3b3] uppercase tracking-widest text-sm text-center">No hay mercados abiertos.</p>
                </div>`;
                return;
            }

            container.innerHTML = markets.map(m => {
                const chartHTML = m.symbol ? `
                    <div class="w-full h-64 md:h-72 mb-6 rounded-xl overflow-hidden border border-white/5 bg-[#121212] shadow-inner pointer-events-auto">
                        <iframe src="https://s.tradingview.com/widgetembed/?symbol=${encodeURIComponent(m.symbol)}&interval=1&theme=dark&style=1&hidesidetoolbar=1" width="100%" height="100%" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
                    </div>
                ` : ``;

                let oracleUI = "";
                if (m.resolution === 'AUTO' && m.endTime) {
                    let timeLeft = Math.floor((m.endTime - Date.now()) / 1000);
                    if (timeLeft < 0) timeLeft = 0;
                    let min = Math.floor(timeLeft / 60);
                    let sec = timeLeft % 60;
                    let timeStr = `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
                    
                    oracleUI = `<span id="timer-${m.id}" class="text-white font-bold font-mono tracking-widest text-sm bg-blue-900/40 px-3 py-1 rounded-full border border-blue-500/50">${timeStr}</span>`;
                } else {
                    oracleUI = `<span class="text-white font-bold uppercase tracking-widest text-[10px] bg-orange-900/40 px-3 py-1 rounded-full border border-orange-500/50">Juez Admin</span>`;
                }

                return `
                <div class="bg-[#181818] border border-white/5 p-4 lg:p-6 rounded-2xl shadow-xl hover:bg-[#282828] transition-colors">
                    <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-3">
                        <div class="flex items-center space-x-2 flex-1 min-w-0 pr-2">
                            <span class="text-[9px] text-[#b3b3b3] font-bold uppercase tracking-[0.2em] border border-white/10 px-2 py-1 rounded-full bg-[#121212] flex-shrink-0">${m.cat}</span>
                            <span class="text-[10px] text-white font-bold uppercase truncate">${m.asset}</span>
                        </div>
                        <div class="flex flex-col items-end flex-shrink-0">
                            <span class="text-[7px] text-[#b3b3b3] uppercase tracking-widest mb-1">Cierre</span>
                            ${oracleUI}
                        </div>
                    </div>
                    
                    <h3 class="text-base lg:text-lg font-black text-white mb-2 leading-tight">${m.question}</h3>
                    
                    <p id="price-tag-${m.id}" class="text-[10px] text-white font-mono mb-4 border border-white/10 bg-[#121212] inline-block px-3 py-1 rounded-full">
                        ${m.startPrice ? `Entrada: $${m.startPrice}` : 'Calculando...'}
                    </p>
                    
                    ${chartHTML}
                    
                    <div class="flex space-x-2 lg:space-x-3 mt-4">
                        <button onclick="makeBet(${m.id}, 'SÍ', '${m.asset}')" class="flex-1 bg-green-700 hover:bg-green-600 text-white font-black py-3 lg:py-4 rounded-full uppercase text-[10px] tracking-widest transition-all active:scale-95 shadow-lg">SÍ (Sube)</button>
                        <button onclick="makeBet(${m.id}, 'NO', '${m.asset}')" class="flex-1 bg-red-700 hover:bg-red-600 text-white font-black py-3 lg:py-4 rounded-full uppercase text-[10px] tracking-widest transition-all active:scale-95 shadow-lg">NO (Baja)</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function makeBet(marketId, side, assetName) {
            if (balance < 100) return alert("Saldo insuficiente.");
            
            let bet = activeBets[marketId] || { side: side, amount: 0, asset: assetName };
            if(bet.amount > 0 && bet.side !== side) return alert("Ya tienes una posición en el lado contrario.");

            balance -= 100;
            bet.amount += 100; 
            activeBets[marketId] = bet;
            
            localStorage.setItem('q_bal_v13', balance);
            localStorage.setItem('q_active_bets_v13', JSON.stringify(activeBets));
            updatePortfolio(); 
        }

        async function fetchRealPrice(symbol) {
            try {
                let cleanSymbol = symbol.replace('BINANCE:', '').replace('CRYPTO:', '');
                const response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${cleanSymbol}`);
                const data = await response.json();
                if(data.price) return parseFloat(data.price);
                return null;
            } catch (error) {
                return null;
            }
        }

        function startGlobalClock() {
            const tick = async () => {
                let markets = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
                let marketsUpdated = false;

                for (let i = 0; i < markets.length; i++) {
                    let m = markets[i];
                    if (m.resolution === 'AUTO' && m.endTime) {
                        let timeLeft = Math.floor((m.endTime - Date.now()) / 1000);
                        let timerEl = document.getElementById(`timer-${m.id}`);
                        let priceTag = document.getElementById(`price-tag-${m.id}`);

                        if (!m.startPrice && m.symbol && m.symbol.includes("BINANCE")) {
                            m.startPrice = await fetchRealPrice(m.symbol);
                            marketsUpdated = true;
                            if (priceTag) priceTag.innerText = `Entrada: $${m.startPrice}`;
                        }

                        if (timeLeft <= 0) {
                            await autoLiquidateAndRestart(m, markets);
                            if (priceTag) priceTag.innerText = `Calculando...`;
                        } else if (timerEl) {
                            let min = Math.floor(timeLeft / 60);
                            let sec = timeLeft % 60;
                            timerEl.innerText = `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
                            if(timeLeft <= 10) timerEl.className = "text-white font-bold font-mono tracking-widest text-sm bg-red-900/80 px-3 py-1 rounded-full border border-red-500 animate-pulse";
                            else timerEl.className = "text-white font-bold font-mono tracking-widest text-sm bg-blue-900/40 px-3 py-1 rounded-full border border-blue-500/50";
                        }
                    }
                }
                if (marketsUpdated) localStorage.setItem('q_markets_v13', JSON.stringify(markets));
            };

            tick(); 
            setInterval(tick, 1000);
        }

        async function autoLiquidateAndRestart(market, marketsArray) {
            let activeBets = JSON.parse(localStorage.getItem('q_active_bets_v13')) || {};
            let userBet = activeBets[market.id];

            let finalPrice = null;
            if (market.symbol && market.symbol.includes("BINANCE")) {
                finalPrice = await fetchRealPrice(market.symbol);
            }

            if (userBet) {
                let won = false;
                let resolutionDetails = "Liquidación Aleatoria";

                if (market.startPrice && finalPrice) {
                    if (userBet.side === 'SÍ' && finalPrice > market.startPrice) won = true;
                    if (userBet.side === 'NO' && finalPrice < market.startPrice) won = true;
                    resolutionDetails = `In: $${market.startPrice} | Out: $${finalPrice}`;
                } else {
                    won = Math.random() > 0.5; 
                }

                if (won) balance += (userBet.amount * 2);

                history.unshift({ win: won, amt: won ? userBet.amount * 2 : userBet.amount, side: userBet.side, asset: market.asset, details: resolutionDetails });
                if(history.length > 8) history.pop();

                localStorage.setItem('q_bal_v13', balance);
                localStorage.setItem('q_hist_v13', JSON.stringify(history));
                
                delete activeBets[market.id];
                localStorage.setItem('q_active_bets_v13', JSON.stringify(activeBets));
                
                const box = document.getElementById('balance-box');
                box.classList.add(won ? 'bg-green-900/50' : 'bg-red-900/50');
                setTimeout(() => box.classList.remove('bg-green-900/50', 'bg-red-900/50'), 1000);
                
                updatePortfolio();
            }

            market.endTime = Date.now() + 120000;
            market.startPrice = null; 
            localStorage.setItem('q_markets_v13', JSON.stringify(marketsArray));
        }

        setInterval(() => {
            let newBal = parseFloat(localStorage.getItem('q_bal_v13')) || 1000;
            let newBetsStr = localStorage.getItem('q_active_bets_v13');
            let newMarkets = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
            
            let currentBetsStr = JSON.stringify(activeBets);

            if (newBal !== balance || newBetsStr !== currentBetsStr) {
                balance = newBal;
                activeBets = JSON.parse(newBetsStr) || {};
                updatePortfolio();
            }

            if (newMarkets.length !== currentMarketsCount) {
                renderMarkets();
            }
        }, 1500);

        window.onload = () => {
            updatePortfolio();
            renderMarkets();
            startGlobalClock();
        };
    </script>
</body>
</html>

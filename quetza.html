<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza Forecast | Mercado Descentralizado</title>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; font-weight: 900; }
        body { transition: background-color 1.5s ease-in-out; }
    </style>
</head>
<body id="app-body" class="bg-slate-950 text-slate-200 font-mono p-4 max-w-screen-xl mx-auto">

    <nav class="flex justify-center space-x-8 mb-8 border-b border-slate-800 pb-2 text-[10px] uppercase tracking-[0.2em]">
        <a href="index.html" class="py-2 text-slate-500 hover:text-yellow-500 transition-all">📡 Monitor Global</a>
        <a href="quetza.html" class="tab-active py-2 transition-all">🦅 Quetza Consensus</a>
    </nav>

    <div>
        <div class="flex justify-between items-start mb-8">
            <div>
                <h2 class="text-2xl font-black text-yellow-500 italic uppercase tracking-tighter">QuetzaPredict MX</h2>
                <p class="text-[7px] text-slate-500 uppercase font-bold tracking-[0.2em]">Mercado en Tiempo Real</p>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl text-right shadow-xl">
                <p class="text-[8px] text-slate-500 uppercase tracking-widest">Saldo fUSDT</p>
                <p id="user-credits" class="text-xl font-black text-green-400">1,000.00</p>
            </div>
        </div>

        <div class="bg-slate-900/80 border border-slate-800 p-6 rounded-2xl border-t-4 border-t-yellow-600 shadow-2xl mb-8">
            <div class="flex justify-between items-center mb-6">
                <span id="market-status-tag" class="bg-red-600 text-white text-[8px] px-2 py-1 rounded-full font-bold animate-pulse uppercase">Mercado Activo</span>
                <span class="text-slate-500 text-[10px]">Cierre en: <span id="quetza-timer" class="font-bold text-yellow-500">--:--</span></span>
            </div>
            
            <h3 class="text-xl font-bold mb-8 italic text-center leading-tight">
                ¿Validarás el <span id="display-asset" class="text-yellow-500 underline">Cargando...</span> sobre <span id="display-price" class="text-white bg-slate-800 px-2">...</span>?
            </h3>

            <div class="flex space-x-3 mb-6">
                <button id="btn-yes" onclick="makeBet('SÍ')" class="flex-1 bg-green-700 hover:bg-green-600 text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-widest shadow-lg transition-transform active:scale-95">Apostar SÍ</button>
                <button id="btn-no" onclick="makeBet('NO')" class="flex-1 bg-red-700 hover:bg-red-600 text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-widest shadow-lg transition-transform active:scale-95">Apostar NO</button>
            </div>

            <div class="border-t border-slate-800 pt-4 flex justify-between text-[10px] uppercase text-slate-500 font-bold mt-4">
                <span>Tu Posición: <span id="user-pos" class="text-white italic">PENDIENTE</span></span>
                <span>Inversión: <span id="user-amt" class="text-white">0.00</span> fUSDT</span>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-dashed border-slate-700 mb-8">
            <h3 class="text-[10px] text-yellow-500 font-bold uppercase tracking-[0.4em] mb-4 text-center">⚙️ Panel de Oráculo (Admin)</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] text-slate-500 uppercase tracking-widest block mb-1">Nombre del Activo</label>
                    <input id="input-asset" type="text" placeholder="Ej: Bitcoin (BTC)" class="w-full bg-slate-950 border border-slate-800 text-white text-sm p-2 rounded focus:outline-none focus:border-yellow-500">
                </div>
                <div>
                    <label class="text-[9px] text-slate-500 uppercase tracking-widest block mb-1">Precio Objetivo ($)</label>
                    <input id="input-price" type="number" placeholder="Ej: 65000" class="w-full bg-slate-950 border border-slate-800 text-white text-sm p-2 rounded focus:outline-none focus:border-yellow-500">
                </div>
            </div>
            <button onclick="saveNewMarket()" class="w-full mt-4 bg-yellow-600 hover:bg-yellow-500 text-slate-950 font-black py-2 rounded uppercase text-[10px] tracking-widest transition-colors">
                Publicar Nueva Pregunta al Mercado
            </button>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN Y ESTADO ---
        let balance = localStorage.getItem('q_bal_v9') ? parseFloat(localStorage.getItem('q_bal_v9')) : 1000.00;
        let activeBet = { side: null, amount: 0 };
        let history = JSON.parse(localStorage.getItem('q_hist_v9')) || [];
        let currentTacoRisk = 50; 
        let timerInterval;

        // --- 2. LÓGICA DEL MERCADO DINÁMICO ---
        function loadMarketConfig() {
            const asset = localStorage.getItem('q_market_asset') || 'Oro (XAUT)';
            const price = localStorage.getItem('q_market_price') || '4850.00';
            document.getElementById('display-asset').innerText = asset;
            document.getElementById('display-price').innerText = `$${parseFloat(price).toLocaleString()}`;
            document.getElementById('input-asset').value = asset;
            document.getElementById('input-price').value = price;
        }

        function saveNewMarket() {
            if(activeBet.amount > 0) return alert("No puedes cambiar la pregunta mientras tienes una apuesta activa.");
            
            const newAsset = document.getElementById('input-asset').value;
            const newPrice = document.getElementById('input-price').value;

            if(newAsset && newPrice) {
                localStorage.setItem('q_market_asset', newAsset);
                localStorage.setItem('q_market_price', newPrice);
                // Al cambiar la pregunta, reiniciamos el tiempo para que empiece el nuevo ciclo
                localStorage.removeItem('q_timer_end');
                location.reload(); 
            }
        }

        // --- 3. CRONÓMETRO PERSISTENTE (SOLUCIÓN F5) ---
        function startPersistentTimer() {
            // Buscamos si ya existe una hora de cierre en el almacenamiento
            let endTime = localStorage.getItem('q_timer_end');

            if (!endTime) {
                // Si no existe, creamos una nueva (Hora actual + 60 segundos)
                endTime = Date.now() + (60 * 1000);
                localStorage.setItem('q_timer_end', endTime);
            }

            const display = document.getElementById('quetza-timer');
            
            timerInterval = setInterval(() => {
                const now = Date.now();
                const timeLeft = Math.floor((endTime - now) / 1000);

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    display.innerText = "00:00";
                    localStorage.removeItem('q_timer_end'); // Limpiar para el siguiente ciclo
                    settleMarket();
                } else {
                    let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                    display.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }, 1000);
        }

        // --- 4. LIQUIDACIÓN Y APUESTAS ---
        function updateUI() {
            document.getElementById('user-credits').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            document.getElementById('user-pos').innerText = activeBet.side || 'PENDIENTE';
            document.getElementById('user-amt').innerText = activeBet.amount.toFixed(2);
            localStorage.setItem('q_bal_v9', balance);
            localStorage.setItem('q_hist_v9', JSON.stringify(history));
        }

        function makeBet(side) {
            if (activeBet.amount > 0) return alert("Ya tienes una posición abierta.");
            if (balance < 100) return alert("Saldo insuficiente.");
            balance -= 100;
            activeBet = { side: side, amount: 100 };
            updateUI();
        }

        function settleMarket() {
            const target = parseFloat(localStorage.getItem('q_market_price')) || 4850.00;
            const asset = localStorage.getItem('q_market_asset') || 'Oro (XAUT)';
            
            // Simulación de precio final
            const finalPrice = (target + (Math.random() * 10) - 5).toFixed(2);
            let won = false;

            // Solo mostramos alerta y calculamos si hubo apuesta
            if (activeBet.amount > 0) {
                if (activeBet.side === 'SÍ' && finalPrice >= target) won = true;
                if (activeBet.side === 'NO' && finalPrice < target) won = true;

                const multiplier = (won && currentTacoRisk > 80) ? 2.5 : 2.0;
                const prize = activeBet.amount * multiplier;

                if (won) balance += prize;
                history.unshift({ win: won, amt: won ? prize : 100, side: activeBet.side, asset: asset });
                if (history.length > 5) history.pop();

                updateUI();
                alert(`MERCADO CERRADO\n${asset} Final: $${finalPrice}\nResultado: ${won ? '¡GANASTE!' : 'Perdiste'}`);
            }

            // Reiniciar estado para el próximo ciclo
            activeBet = { side: null, amount: 0 };
            updateUI();
            startPersistentTimer(); // Reiniciar el cronómetro automáticamente
        }

        // --- 5. CONEXIÓN CON IA (FONDO DINÁMICO) ---
        async function fetchAIContext() {
            try {
                const response = await fetch('/api/getTacoData');
                const aiData = await response.json();
                if (response.ok) {
                    currentTacoRisk = aiData.risk;
                    document.getElementById('app-body').style.backgroundColor = aiData.alert ? "#2a1508" : "#020617";
                }
            } catch (e) {}
        }

        window.onload = () => {
            loadMarketConfig();
            updateUI();
            startPersistentTimer();
            fetchAIContext(); 
            setInterval(fetchAIContext, 120000);
        };
    </script>
</body>
</html>

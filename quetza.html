<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza MX | Terminal</title>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; font-weight: 900; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #333333; }
        ::-webkit-scrollbar-thumb { background: #425465; border-radius: 10px; }
    </style>
</head>
<body id="app-body" class="bg-gradient-to-br from-[#333333] to-[#2a3642] text-slate-200 font-sans p-3 lg:p-4 max-w-[1600px] mx-auto min-h-screen lg:h-screen flex flex-col lg:overflow-hidden relative z-0">

    <nav class="relative h-16 flex justify-between items-center mb-6 border-b border-[#425465] flex-shrink-0 pt-4">
        
        <a href="index.html" class="absolute left-0 z-20 flex items-center hover:opacity-80 transition-opacity">
            <img src="(COPY) Logotipo 500x500 px.png" alt="Logo" class="w-21 h-21 lg:w-28 lg:h-28 object-contain drop-shadow-lg">
            <span class="ml-2 text-white font-black tracking-tighter text-lg hidden md:block uppercase">Predicciones</span>
        </a>

        <div class="ml-auto flex space-x-4 lg:space-x-8 text-[10px] uppercase tracking-[0.2em]">
            <a href="index.html" class="py-2 text-slate-400 hover:text-white transition-all">📡 Monitor</a>
            <a href="quetza.html" class="tab-active py-2">🦅 Consensus</a>
        </div>
    </nav>

    <div class="flex flex-col lg:flex-row gap-6 flex-grow lg:overflow-hidden pb-4">
        <div class="lg:w-2/3 flex flex-col lg:overflow-hidden">
            <h2 class="text-xl font-black text-white uppercase tracking-tighter mb-4 flex-shrink-0">🌎 Mercados</h2>
            <div id="markets-container" class="lg:overflow-y-auto pr-0 lg:pr-2 pb-10 space-y-6 flex-grow"></div>
        </div>

        <div class="lg:w-1/3 bg-[#1e272e] border border-[#425465] rounded-[10px] flex flex-col lg:overflow-hidden shadow-2xl">
            <div class="p-5 lg:p-6 border-b border-[#425465]">
                <h2 class="text-lg font-black text-white uppercase mb-4">Portafolio</h2>
                <div class="bg-[#2a3642] px-4 py-3 rounded-[10px] border border-[#425465] text-center mb-4">
                    <p class="text-[10px] text-slate-400 uppercase mb-1">Saldo Disponible</p>
                    <p class="text-3xl font-black text-[#10b981] font-mono">$<span id="user-credits">1,000.00</span></p>
                </div>
                <div class="flex justify-between text-center px-4">
                    <div><p class="text-[9px] text-slate-400 uppercase">Win Rate</p><p id="stat-winrate" class="text-lg font-black text-yellow-500">0%</p></div>
                    <div><p class="text-[9px] text-slate-400 uppercase">Trades</p><p id="stat-trades" class="text-lg font-black text-white">0</p></div>
                </div>
            </div>
            <div class="flex-grow lg:overflow-y-auto p-5 lg:p-6 space-y-6">
                <div><h3 class="text-[10px] text-yellow-500 font-bold uppercase mb-3 border-b border-[#425465] pb-1">⚡ Posiciones</h3><div id="open-positions-list" class="space-y-2"></div></div>
                <div><h3 class="text-[10px] text-slate-400 font-bold uppercase mb-3 border-b border-[#425465] pb-1">📜 Historial</h3><div id="history-list" class="space-y-2 opacity-80"></div></div>
            </div>
        </div>
    </div>

    <script>
        let balance = localStorage.getItem('q_bal_v13') ? parseFloat(localStorage.getItem('q_bal_v13')) : 1000.00;
        let history = JSON.parse(localStorage.getItem('q_hist_v13')) || [];
        let activeBets = JSON.parse(localStorage.getItem('q_active_bets_v13')) || {};
        let currentMarketsCount = 0;

        function updatePortfolio() {
            document.getElementById('user-credits').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            const total = history.length, wins = history.filter(h => h.win).length;
            document.getElementById('stat-trades').innerText = total;
            document.getElementById('stat-winrate').innerText = total > 0 ? `${Math.round((wins / total) * 100)}%` : `0%`;
            const posList = document.getElementById('open-positions-list'), betKeys = Object.keys(activeBets);
            posList.innerHTML = betKeys.length === 0 ? `<p class="text-[10px] text-slate-500 italic">Sin inversión.</p>` : betKeys.map(k => {
                const b = activeBets[k];
                return `<div class="bg-[#2a3642] border border-[#425465] p-3 rounded-[10px] flex justify-between animate-pulse">
                    <div><p class="text-[10px] text-slate-300 truncate w-32 uppercase">${b.asset}</p><p class="text-xs font-bold ${b.side==='SÍ'?'text-green-400':'text-red-400'}">${b.side}</p></div>
                    <div class="text-right"><p class="text-sm font-black text-white">${b.amount}</p></div>
                </div>`;
            }).join('');
            const histList = document.getElementById('history-list');
            histList.innerHTML = history.length === 0 ? `<p class="text-[10px] text-slate-500 italic">Vacío.</p>` : history.map(h => `
                <div class="flex justify-between items-center border-b border-[#425465] pb-2 mb-2">
                    <div><p class="text-[9px] font-bold ${h.win?'text-green-400':'text-slate-500'} uppercase">${h.win?'GANASTE':'PERDISTE'}</p><p class="text-[10px] text-slate-300 truncate w-32">${h.asset}</p></div>
                    <p class="text-[11px] font-mono text-white">${h.win?'+':'-'}${h.amt}</p>
                </div>`).join('');
        }

        function renderMarkets() {
            let markets = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
            currentMarketsCount = markets.length;
            const container = document.getElementById('markets-container');
            if (markets.length === 0) { container.innerHTML = `<p class="text-slate-500 text-center py-10 uppercase tracking-widest text-xs">Mercado Cerrado</p>`; return; }
            container.innerHTML = markets.map(m => {
                const chartHTML = m.symbol ? `<div class="w-full h-64 md:h-72 mb-6 rounded-[10px] overflow-hidden border border-[#425465] bg-[#121212]"><iframe src="https://s.tradingview.com/widgetembed/?symbol=${encodeURIComponent(m.symbol)}&interval=1&theme=dark" width="100%" height="100%" frameborder="0"></iframe></div>` : ``;
                let timeStr = "00:00";
                if(m.endTime) {
                    let t = Math.floor((m.endTime - Date.now()) / 1000);
                    if(t < 0) t = 0;
                    let min = Math.floor(t/60), sec = t%60;
                    timeStr = `${min<10?'0':''}${min}:${sec<10?'0':''}${sec}`;
                }
                return `<div class="bg-[#1e272e] border border-[#425465] p-4 lg:p-6 rounded-[10px] shadow-xl">
                    <div class="flex justify-between items-center mb-4 border-b border-[#425465] pb-3">
                        <span class="text-[10px] text-white font-bold uppercase truncate">${m.asset}</span>
                        <span id="timer-${m.id}" class="text-yellow-500 font-mono font-bold text-sm bg-yellow-500/10 px-3 py-1 rounded-[5px] border border-yellow-500/30">${timeStr}</span>
                    </div>
                    <h3 class="text-base lg:text-lg font-black text-white mb-2">${m.question}</h3>
                    <p id="price-tag-${m.id}" class="text-[10px] text-yellow-500 font-mono mb-4 border border-[#425465] bg-[#2a3642] inline-block px-3 py-1 rounded-[5px] font-bold">${m.startPrice?`Entrada: $${m.startPrice}`:'Calculando...'}</p>
                    ${chartHTML}
                    <div class="flex space-x-3 mt-4">
                        <button onclick="makeBet(${m.id}, 'SÍ', '${m.asset}')" class="flex-1 bg-[#1f6838] hover:bg-[#164b28] text-white font-black py-3 rounded-[10px] uppercase text-[10px] tracking-widest transition-all shadow-lg">SÍ (Sube)</button>
                        <button onclick="makeBet(${m.id}, 'NO', '${m.asset}')" class="flex-1 bg-red-700 hover:bg-red-800 text-white font-black py-3 rounded-[10px] uppercase text-[10px] tracking-widest transition-all shadow-lg">NO (Baja)</button>
                    </div>
                </div>`;
            }).join('');
        }

        function makeBet(id, side, asset) {
            if (balance < 100) return alert("Saldo insuficiente.");
            let bet = activeBets[id] || { side: side, amount: 0, asset: asset };
            if(bet.amount > 0 && bet.side !== side) return alert("No puedes jugar ambos lados.");
            balance -= 100; bet.amount += 100; activeBets[id] = bet;
            localStorage.setItem('q_bal_v13', balance);
            localStorage.setItem('q_active_bets_v13', JSON.stringify(activeBets));
            updatePortfolio(); 
        }

        async function fetchRealPrice(symbol) {
            try {
                let s = symbol.replace('BINANCE:', '').replace('CRYPTO:', '');
                const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${s}`);
                const d = await r.json(); return parseFloat(d.price);
            } catch (e) { return null; }
        }

        function startGlobalClock() {
            const tick = async () => {
                let mk = JSON.parse(localStorage.getItem('q_markets_v13')) || [];
                let upd = false;
                for (let m of mk) {
                    if (m.resolution === 'AUTO' && m.endTime) {
                        let t = Math.floor((m.endTime - Date.now()) / 1000);
                        let tEl = document.getElementById(`timer-${m.id}`), pEl = document.getElementById(`price-tag-${m.id}`);
                        if (!m.startPrice && m.symbol && m.symbol.includes("BINANCE")) {
                            m.startPrice = await fetchRealPrice(m.symbol); upd = true;
                            if (pEl) pEl.innerText = `Entrada: $${m.startPrice}`;
                        }
                        if (t <= 0) await autoLiquidate(m, mk);
                        else if (tEl) {
                            let min = Math.floor(t/60), sec = t%60;
                            tEl.innerText = `${min<10?'0':''}${min}:${sec<10?'0':''}${sec}`;
                        }
                    }
                }
                if (upd) localStorage.setItem('q_markets_v13', JSON.stringify(mk));
            };
            tick(); setInterval(tick, 1000);
        }

        async function autoLiquidate(market, mkArr) {
            let ab = JSON.parse(localStorage.getItem('q_active_bets_v13')) || {};
            let ub = ab[market.id];
            let fP = market.symbol ? await fetchRealPrice(market.symbol) : null;
            if (ub) {
                let won = (market.startPrice && fP) ? (ub.side==='SÍ'?fP>market.startPrice:fP<market.startPrice) : Math.random()>0.5;
                if (won) balance += (ub.amount * 2);
                history.unshift({ win: won, amt: won?ub.amount*2:ub.amount, side: ub.side, asset: market.asset });
                if(history.length > 8) history.pop();
                localStorage.setItem('q_bal_v13', balance);
                localStorage.setItem('q_hist_v13', JSON.stringify(history));
                delete ab[market.id];
                localStorage.setItem('q_active_bets_v13', JSON.stringify(ab));
                updatePortfolio();
            }
            market.endTime = Date.now() + 120000; market.startPrice = null; 
            localStorage.setItem('q_markets_v13', JSON.stringify(mkArr));
        }

        setInterval(() => {
            let nB = parseFloat(localStorage.getItem('q_bal_v13')) || 1000, nA = localStorage.getItem('q_active_bets_v13'), nM = (JSON.parse(localStorage.getItem('q_markets_v13')) || []).length;
            if (nB !== balance || nA !== JSON.stringify(activeBets)) { balance = nB; activeBets = JSON.parse(nA) || {}; updatePortfolio(); }
            if (nM !== currentMarketsCount) renderMarkets();
        }, 1500);

        window.onload = () => { updatePortfolio(); renderMarkets(); startGlobalClock(); };
    </script>
</body>
</html>

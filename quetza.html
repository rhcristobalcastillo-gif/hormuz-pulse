<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza Forecast | User Console</title>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; font-weight: 900; }
        body { transition: background-color 1.5s ease-in-out; }
    </style>
</head>
<body id="app-body" class="bg-slate-950 text-slate-200 font-mono p-4 max-w-screen-xl mx-auto">

    <nav class="flex justify-center space-x-8 mb-8 border-b border-slate-800 pb-2 text-[10px] uppercase tracking-[0.2em]">
        <a href="index.html" class="py-2 text-slate-500 hover:text-yellow-500 transition-all">📡 Monitor Global</a>
        <a href="quetza.html" class="tab-active py-2 transition-all">🦅 Quetza Consensus</a>
    </nav>

    <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl mb-8 flex flex-col md:flex-row justify-between items-center">
        <div class="mb-4 md:mb-0">
            <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Tu Perfil</h2>
            <div id="user-badge" class="inline-block mt-1 bg-slate-800 text-yellow-500 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest border border-yellow-900">
                🌱 Rango: Iniciado
            </div>
        </div>
        
        <div class="flex space-x-6 text-center">
            <div>
                <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-1">Win Rate</p>
                <p id="stat-winrate" class="text-xl font-black text-blue-400">0%</p>
            </div>
            <div>
                <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-1">Operaciones</p>
                <p id="stat-trades" class="text-xl font-black text-white">0</p>
            </div>
            <div class="bg-slate-950 px-4 py-2 rounded-xl border border-slate-800">
                <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-1">Saldo fUSDT</p>
                <p id="user-credits" class="text-xl font-black text-green-400">1,000.00</p>
            </div>
        </div>
    </div>

    <h3 class="text-[12px] text-yellow-500 font-bold uppercase tracking-[0.3em] mb-6 border-b border-slate-800 pb-2">Mercados Abiertos</h3>

    <div id="markets-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        </div>

    <script>
        // --- ESTADO DEL USUARIO ---
        let balance = localStorage.getItem('q_bal_v11') ? parseFloat(localStorage.getItem('q_bal_v11')) : 1000.00;
        let history = JSON.parse(localStorage.getItem('q_hist_v11')) || [];
        let activeBets = {}; // Ahora podemos tener múltiples apuestas a la vez (por ID de mercado)

        // --- RENDERIZAR LOGROS ---
        function updateDashboard() {
            document.getElementById('user-credits').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            
            const totalTrades = history.length;
            const wins = history.filter(h => h.win).length;
            const winRate = totalTrades > 0 ? Math.round((wins / totalTrades) * 100) : 0;

            document.getElementById('stat-trades').innerText = totalTrades;
            document.getElementById('stat-winrate').innerText = `${winRate}%`;

            // Lógica de insignias (Gamificación)
            const badgeEl = document.getElementById('user-badge');
            if (wins >= 10) { badgeEl.innerHTML = "🏆 Rango: Maestro Oráculo"; badgeEl.className = "inline-block mt-1 bg-yellow-900 text-yellow-300 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest border border-yellow-500"; }
            else if (wins >= 5) { badgeEl.innerHTML = "🔥 Rango: Analista Experto"; badgeEl.className = "inline-block mt-1 bg-orange-900 text-orange-300 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest border border-orange-500"; }
            else if (wins >= 1) { badgeEl.innerHTML = "📈 Rango: Trader Activo"; }
        }

        // --- RENDERIZAR MERCADOS ---
        function renderMarkets() {
            let markets = JSON.parse(localStorage.getItem('q_markets_v11')) || [];
            const container = document.getElementById('markets-container');

            if (markets.length === 0) {
                container.innerHTML = `<p class="text-slate-500 italic text-sm">No hay mercados activos. Esperando al Administrador...</p>`;
                return;
            }

            container.innerHTML = markets.map(m => {
                // Si hay símbolo de TradingView, renderizamos el iframe, si no, lo ocultamos.
                const chartHTML = m.symbol ? `
                    <div class="w-full h-32 mb-4 rounded-xl overflow-hidden border border-slate-800 bg-slate-950">
                        <iframe src="https://s.tradingview.com/widgetembed/?symbol=${encodeURIComponent(m.symbol)}&interval=D&theme=dark&style=3&hidesidetoolbar=1" width="100%" height="100%" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
                    </div>
                ` : `<div class="w-full h-12 mb-4 rounded-xl border border-slate-800 bg-slate-950 flex items-center justify-center text-[9px] text-slate-500 uppercase tracking-widest">Gráfico no disponible para esta categoría</div>`;

                // Verificar si ya apostó en este mercado
                const hasBet = activeBets[m.id];
                const btnState = hasBet ? 'opacity-50 cursor-not-allowed' : 'hover:scale-[1.02] active:scale-95';

                return `
                <div class="bg-slate-900/80 border border-slate-800 p-6 rounded-2xl shadow-xl flex flex-col justify-between">
                    <div>
                        <span class="bg-slate-800 text-slate-300 text-[8px] px-2 py-1 rounded-full font-bold uppercase tracking-widest border border-slate-700">${m.cat}</span>
                        <h3 class="text-lg font-bold text-white mt-4 mb-4 leading-tight">${m.question}</h3>
                        ${chartHTML}
                    </div>
                    
                    <div>
                        ${hasBet ? `<p class="text-[10px] text-yellow-500 uppercase tracking-widest text-center mb-2 font-bold animate-pulse">Tu apuesta: ${hasBet.side} (100 fUSDT)</p>` : ''}
                        <div class="flex space-x-2">
                            <button onclick="makeBet(${m.id}, 'SÍ', '${m.asset}')" class="flex-1 bg-green-800 text-white font-black py-3 rounded-xl uppercase text-[10px] tracking-widest transition-transform ${btnState}" ${hasBet ? 'disabled' : ''}>SÍ</button>
                            <button onclick="makeBet(${m.id}, 'NO', '${m.asset}')" class="flex-1 bg-red-800 text-white font-black py-3 rounded-xl uppercase text-[10px] tracking-widest transition-transform ${btnState}" ${hasBet ? 'disabled' : ''}>NO</button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // --- LÓGICA DE APUESTAS ---
        function makeBet(marketId, side, assetName) {
            if (balance < 100) return alert("Saldo insuficiente.");
            
            balance -= 100;
            activeBets[marketId] = { side: side, amount: 100, asset: assetName };
            
            localStorage.setItem('q_bal_v11', balance);
            updateDashboard();
            renderMarkets(); // Re-renderizar para deshabilitar botones
            
            alert(`Apuesta registrada: ${side} a ${assetName}`);
            
            // Simular resolución de mercado después de 10 segundos
            setTimeout(() => simulateResolution(marketId), 10000);
        }

        // Para este MVP, el mercado se autoliquida a los 10 segundos de apostar para darle feedback rápido al usuario
        function simulateResolution(marketId) {
            const bet = activeBets[marketId];
            if (!bet) return;

            const won = Math.random() > 0.5; // 50/50 probabilidad
            if (won) balance += (bet.amount * 2);

            history.unshift({ win: won, amt: won ? bet.amount * 2 : bet.amount, side: bet.side, asset: bet.asset });
            
            delete activeBets[marketId]; // Limpiar apuesta activa
            
            localStorage.setItem('q_bal_v11', balance);
            localStorage.setItem('q_hist_v11', JSON.stringify(history));
            
            updateDashboard();
            renderMarkets();
            alert(`RESULTADO DE ${bet.asset}:\n¡${won ? 'GANASTE' : 'PERDISTE'}!`);
        }

        window.onload = () => {
            updateDashboard();
            renderMarkets();
        };
    </script>
</body>
</html>

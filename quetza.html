<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quetza Forecast | User Console</title>
    <style>
        .tab-active { border-bottom: 3px solid #eab308; color: #eab308; font-weight: 900; }
        body { transition: background-color 1.5s ease-in-out; }
    </style>
</head>
<body id="app-body" class="bg-slate-950 text-slate-200 font-mono p-4 max-w-screen-xl mx-auto">

    <nav class="flex justify-center space-x-8 mb-8 border-b border-slate-800 pb-2 text-[10px] uppercase tracking-[0.2em]">
        <a href="index.html" class="py-2 text-slate-500 hover:text-yellow-500 transition-all">📡 Monitor Global</a>
        <a href="quetza.html" class="tab-active py-2 transition-all">🦅 Quetza Consensus</a>
    </nav>

    <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl mb-8 flex flex-col md:flex-row justify-between items-center border-l-4 border-l-yellow-600">
        <div class="mb-4 md:mb-0">
            <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Nodo Jalisco | Usuario</h2>
            <div id="user-badge" class="inline-block mt-1 bg-slate-800 text-yellow-500 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest border border-yellow-900 uppercase">
                🌱 Iniciado
            </div>
        </div>
        
        <div class="flex space-x-6 text-center">
            <div>
                <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-1">Win Rate</p>
                <p id="stat-winrate" class="text-xl font-black text-blue-400">0%</p>
            </div>
            <div>
                <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-1">Operaciones</p>
                <p id="stat-trades" class="text-xl font-black text-white">0</p>
            </div>
            <div class="bg-slate-950 px-4 py-2 rounded-xl border border-slate-800 shadow-inner">
                <p class="text-[9px] text-slate-500 uppercase tracking-widest mb-1">Saldo fUSDT</p>
                <p id="user-credits" class="text-xl font-black text-green-400">1,000.00</p>
            </div>
        </div>
    </div>

    <div id="markets-container" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        </div>

    <script>
        let balance = localStorage.getItem('q_bal_v11') ? parseFloat(localStorage.getItem('q_bal_v11')) : 1000.00;
        let history = JSON.parse(localStorage.getItem('q_hist_v11')) || [];
        let activeBets = {};

        function updateDashboard() {
            document.getElementById('user-credits').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
            const totalTrades = history.length;
            const wins = history.filter(h => h.win).length;
            const winRate = totalTrades > 0 ? Math.round((wins / totalTrades) * 100) : 0;
            document.getElementById('stat-trades').innerText = totalTrades;
            document.getElementById('stat-winrate').innerText = `${winRate}%`;
        }

        function renderMarkets() {
            let markets = JSON.parse(localStorage.getItem('q_markets_v11')) || [];
            const container = document.getElementById('markets-container');

            if (markets.length === 0) {
                container.innerHTML = `<p class="text-slate-500 italic text-sm text-center col-span-2 py-10">Esperando que el Administrador publique nuevos mercados...</p>`;
                return;
            }

            container.innerHTML = markets.map(m => {
                const chartHTML = m.symbol ? `
                    <div class="w-full h-48 mb-6 rounded-xl overflow-hidden border border-slate-800 bg-slate-950 shadow-inner">
                        <iframe src="https://s.tradingview.com/widgetembed/?symbol=${encodeURIComponent(m.symbol)}&interval=15&theme=dark&style=1&hidesidetoolbar=1" width="100%" height="100%" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
                    </div>
                ` : `<div class="w-full h-12 mb-6 rounded-xl bg-slate-950 border border-slate-800 flex items-center justify-center text-[8px] text-slate-600 uppercase tracking-widest italic">Análisis de gráfico no disponible para esta categoría</div>`;

                const hasBet = activeBets[m.id];
                const btnClass = hasBet ? 'opacity-30 cursor-not-allowed' : 'hover:bg-opacity-80 active:scale-95 transition-all';

                return `
                <div class="bg-slate-900/50 border border-slate-800 p-8 rounded-3xl shadow-2xl relative overflow-hidden group">
                    <div class="relative z-10">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] text-yellow-500 font-bold uppercase tracking-[0.2em] border border-yellow-900/50 px-2 py-1 rounded-md bg-yellow-950/20">${m.cat}</span>
                            <span class="text-[9px] text-slate-500 font-mono">ID: #${m.id.toString().slice(-4)}</span>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-6 leading-tight">${m.question}</h3>
                        ${chartHTML}
                        
                        <div class="flex space-x-3 mt-4">
                            <button onclick="makeBet(${m.id}, 'SÍ', '${m.asset}')" class="flex-1 bg-green-700 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest ${btnClass}" ${hasBet ? 'disabled' : ''}>Validar SÍ</button>
                            <button onclick="makeBet(${m.id}, 'NO', '${m.asset}')" class="flex-1 bg-red-700 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest ${btnClass}" ${hasBet ? 'disabled' : ''}>Validar NO</button>
                        </div>
                        ${hasBet ? `<p class="mt-4 text-center text-yellow-500 text-[10px] font-bold animate-pulse uppercase tracking-widest">Posición Abierta: ${hasBet.side}</p>` : ''}
                    </div>
                </div>
                `;
            }).join('');
        }

        function makeBet(marketId, side, assetName) {
            if (balance < 100) return alert("Saldo insuficiente.");
            balance -= 100;
            activeBets[marketId] = { side: side, amount: 100, asset: assetName };
            updateDashboard();
            renderMarkets();
            setTimeout(() => simulateResolution(marketId), 8000);
        }

        function simulateResolution(marketId) {
            const bet = activeBets[marketId];
            if (!bet) return;
            const won = Math.random() > 0.5;
            if (won) balance += 200;
            history.unshift({ win: won, amt: won ? 200 : 100, side: bet.side, asset: bet.asset });
            delete activeBets[marketId];
            localStorage.setItem('q_bal_v11', balance);
            localStorage.setItem('q_hist_v11', JSON.stringify(history));
            updateDashboard();
            renderMarkets();
            alert(`${bet.asset}: ${won ? '¡MERCADO VALIDADO! +100 fUSDT' : 'MERCADO LIQUIDADO'}`);
        }

        window.onload = () => {
            updateDashboard();
            renderMarkets();
        };
    </script>
</body>
</html>
